<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AtomicBlast</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AtomicBlast">
  <meta name="theme-color" content="#080c08">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/assets/icon-192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #080c08; color: #e0e0e0; font-family: 'Segoe UI Variable', 'Segoe UI', system-ui, -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; user-select: none; }

    /* ===== TOP NAV BAR ===== */
    .topnav { height: 60px; min-height: 60px; background: rgba(8,12,8,0.97); display: flex; align-items: center; padding: 0 20px; gap: 0; border-bottom: 1px solid rgba(74,222,128,0.08); position: relative; z-index: 100; flex-shrink: 0; }
    .topnav-logo { width: 36px; height: 36px; margin-right: 20px; flex-shrink: 0; }
    .topnav-logo img { width: 100%; height: 100%; object-fit: contain; }
    .topnav-tabs { display: flex; align-items: center; gap: 2px; }
    .topnav-right { display: flex; align-items: center; gap: 8px; margin-left: auto; }
    .nav-item { padding: 7px 16px; cursor: pointer; transition: color 0.15s, background 0.15s; font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 7px; color: #555; border-radius: 7px; letter-spacing: 0.06em; text-transform: uppercase; white-space: nowrap; }
    .nav-item:hover { background: rgba(74,222,128,0.07); color: #bbb; }
    .nav-item.active { color: #4ade80; background: rgba(74,222,128,0.1); }
    .nav-icon { font-size: 15px; line-height: 1; }

    /* ===== MAIN LAYOUT ===== */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
    .view-header { padding: 18px 32px 0; display: flex; align-items: baseline; gap: 12px; flex-shrink: 0; }
    .view-header h2 { font-size: 20px; font-weight: 700; color: #fff; }
    .view-header .subtitle { font-size: 12px; color: #444; }
    .search-bar input { background: rgba(255,255,255,0.05); border: 1px solid rgba(74,222,128,0.15); border-radius: 8px; padding: 7px 14px; color: #ccc; font-size: 13px; width: 220px; outline: none; transition: border-color 0.15s; }
    .search-bar input::placeholder { color: #444; }
    .search-bar input:focus { border-color: rgba(74,222,128,0.5); background: rgba(255,255,255,0.07); }
    .main-body { flex: 1; overflow-y: auto; padding: 16px 32px 100px; min-height: 0; }
    .main-body::-webkit-scrollbar { width: 5px; }
    .main-body::-webkit-scrollbar-thumb { background: #1a2e1a; border-radius: 4px; }

    /* STATES */
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 300px; color: #555; gap: 12px; }
    .spinner { width: 32px; height: 32px; border: 3px solid #1a2e1a; border-top-color: #4ade80; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 300px; color: #444; gap: 8px; }
    .empty-state .empty-text { font-size: 16px; } .empty-state .empty-sub { font-size: 13px; color: #333; }
    .status-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 28px; background: #05090a; border-top: 1px solid rgba(74,222,128,0.08); display: flex; align-items: center; padding: 0 18px; font-size: 11px; color: #444; gap: 20px; z-index: 60; }
    .status-bar .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #4caf50; display: inline-block; }
    .gp-focus { outline: 3px solid #00e5ff !important; outline-offset: 3px; box-shadow: 0 0 0 6px rgba(0,229,255,.20) !important; z-index: 2; position: relative; }
    #gp-indicator { display: none; font-size: 11px; color: #00e5ff; margin-left: 12px; letter-spacing: .03em; }
    .back-btn { background: #0f1a0f; border: 1px solid #1a2e1a; border-radius: 8px; color: #999; padding: 6px 14px; cursor: pointer; font-size: 13px; }
    .back-btn:hover { border-color: #4ade80; color: #4ade80; }
    body.playlist-modal-open .music-content,
    body.playlist-modal-open #main-content,
    body.playlist-modal-open .main-body,
    body.playlist-modal-open #player-bar,
    body.playlist-modal-open #now-playing-panel,
    body.playlist-modal-open .music-lib-panel { pointer-events: none !important; }
    body.playlist-modal-open #new-pl-modal,
    body.playlist-modal-open #new-pl-modal * { pointer-events: auto !important; }

    /* ===== MUSIC PLAYER ===== */
    .music-layout { display:flex; height:100%; overflow:hidden; }
    .music-lib-panel { width:220px; min-width:220px; background:#080f08; border-right:1px solid #1a2e1a; display:flex; flex-direction:column; overflow:hidden; }
    .music-lib-search { padding:10px 10px 6px; }
    .music-lib-search input { width:100%; background:#0f1a0f; border:1px solid #1a2e1a; color:#ccc; padding:6px 10px; border-radius:6px; font-size:12px; outline:none; box-sizing:border-box; }
    .music-tree { flex:1; overflow-y:auto; padding:6px 0; }
    .music-tree-section { font-size:10px; color:#333; text-transform:uppercase; padding:8px 12px 4px; letter-spacing:.08em; }
    .music-tree-item { padding:6px 12px; font-size:12px; color:#666; cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; border-left:2px solid transparent; transition:color .15s,border-color .15s; }
    .music-tree-item:hover, .music-tree-item.active { color:#ccc; border-left-color:#4ade80; }
    .music-tree-item.indent { padding-left:22px; font-size:11px; }
    .music-tree-item.indent.active { color:#4ade80; }
    .music-tree-item.artist-node { color:#555; font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.04em; }
    .music-stream-section { padding:10px; border-top:1px solid #1a2e1a; flex-shrink:0; }
    .music-stream-section input { width:100%; background:#0f1a0f; border:1px solid #1a2e1a; color:#ccc; padding:6px 10px; border-radius:6px 6px 0 0; font-size:11px; outline:none; box-sizing:border-box; }
    .music-stream-section button { width:100%; background:#1a2e1a; border:1px solid #1a2e1a; border-top:none; color:#4ade80; padding:5px; border-radius:0 0 6px 6px; cursor:pointer; font-size:12px; }
    .music-stream-section button:hover { background:#233823; }
    .music-content { flex:1; overflow-y:auto; display:flex; flex-direction:column; min-width:0; }
    .music-album-header { display:flex; align-items:flex-end; gap:16px; padding:24px 24px 16px; background:linear-gradient(to bottom,#0f1f0f,#080f08); flex-shrink:0; }
    .music-album-art { width:100px; height:100px; border-radius:4px; object-fit:cover; background:#0f1a0f; flex-shrink:0; box-shadow:0 4px 16px rgba(0,0,0,.5); }
    .music-album-art.placeholder { display:flex; align-items:center; justify-content:center; font-size:36px; color:#2a3e2a; }
    .music-album-meta { min-width:0; }
    .music-album-meta h2 { margin:0 0 4px; color:#fff; font-size:18px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .music-album-meta .meta-sub { margin:0 0 2px; color:#555; font-size:12px; }
    .music-album-meta .play-all-btn { margin-top:10px; background:#4ade80; color:#000; border:none; padding:6px 18px; border-radius:20px; font-size:12px; cursor:pointer; font-weight:600; }
    .music-album-meta .play-all-btn:hover { background:#6ee7a0; }
    .music-tracks-list { padding:0 16px 80px; }
    .music-track-header { display:grid; grid-template-columns:32px 1fr 24px 70px 54px; padding:6px 10px; color:#2a3e2a; font-size:10px; border-bottom:1px solid #1a2e1a; text-transform:uppercase; letter-spacing:.06em; margin-top:8px; }
    .music-track-row { display:grid; grid-template-columns:32px 1fr 24px 70px 54px; padding:7px 10px; color:#555; font-size:13px; cursor:pointer; border-radius:4px; align-items:center; }
    .music-track-row:hover { background:#0d180d; color:#bbb; }
    .music-track-row.playing { color:#4ade80; }
    .music-track-num { color:#2a3e2a; text-align:right; padding-right:10px; font-size:12px; min-width:0; }
    .music-track-info { overflow:hidden; }
    .music-track-title { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .music-track-artist { font-size:11px; color:#3a4e3a; margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .music-track-row:hover .music-track-artist, .music-track-row.playing .music-track-artist { color:#5a6e5a; }
    .music-track-dur { text-align:right; color:#3a4e3a; font-size:12px; }
    .music-track-fmt { text-align:right; color:#2a3e2a; font-size:10px; text-transform:uppercase; }
    .music-video-wrap { flex:1; display:flex; align-items:center; justify-content:center; background:#000; min-height:200px; }
    #music-video-el { width:100%; height:100%; max-height:calc(100vh - 180px); object-fit:contain; display:block; }
    .music-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:300px; color:#333; gap:10px; text-align:center; padding:20px; }
    .music-empty .me-icon { font-size:48px; }
    .music-empty .me-text { font-size:13px; line-height:1.6; }

    /* ===== CLOUD BROWSER ===== */
    .cloud-browser { padding:16px 24px; }
    .cloud-breadcrumb { display:flex; align-items:center; gap:4px; flex-wrap:wrap; margin-bottom:14px; }
    .cloud-breadcrumb span { color:#333; font-size:11px; cursor:pointer; transition:color .15s; }
    .cloud-breadcrumb span:hover { color:#ccc; }
    .cloud-breadcrumb span.active { color:#4ade80; cursor:default; }
    .cloud-breadcrumb .crumb-sep { color:#222; }
    .cloud-item-list { display:flex; flex-direction:column; gap:2px; }
    .cloud-item { display:flex; align-items:center; gap:10px; padding:7px 12px; border-radius:4px; color:#666; font-size:13px; transition:background .1s; }
    .cloud-item:hover { background:#0f1a0f; color:#ccc; }
    .cloud-item.is-folder { color:#4ade80; cursor:pointer; }
    .cloud-item-icon { font-size:13px; flex-shrink:0; }
    .cloud-item-name { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .cloud-item-meta { color:#333; font-size:10px; flex-shrink:0; }
    .cloud-play-btn { background:none; border:1px solid #1a2e1a; color:#4ade80; padding:3px 8px; border-radius:3px; cursor:pointer; font-size:11px; flex-shrink:0; }
    .cloud-play-btn:hover { background:#1a2e1a; }
    /* Cloud source config cards in Settings */
    .cloud-source-card { background:#0a150a; border:1px solid #1a2e1a; border-radius:6px; padding:16px; margin-bottom:12px; }
    .cloud-source-card-header { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
    .cloud-source-card-header select, .cloud-source-card-header input { background:#0f1a0f; border:1px solid #1a2e1a; color:#ccc; padding:5px 8px; border-radius:4px; font-size:12px; }
    .cloud-source-card-header select { cursor:pointer; }
    .cloud-remove-btn { margin-left:auto; background:none; border:1px solid #3a1a1a; color:#c44; padding:3px 8px; border-radius:3px; cursor:pointer; font-size:11px; }
    .cloud-remove-btn:hover { background:#3a1a1a; }
    .cloud-field { margin-bottom:8px; }
    .cloud-field label { display:block; color:#555; font-size:11px; margin-bottom:3px; }
    .cloud-field input { width:100%; background:#0f1a0f; border:1px solid #1a2e1a; color:#ccc; padding:6px 10px; border-radius:4px; font-size:12px; box-sizing:border-box; outline:none; }
    .cloud-field input:focus { border-color:#4ade80; }

    /* ===== PERSISTENT PLAYER BAR ===== */
    #player-bar {
      --player-cover-image: none;
      position: fixed;
      bottom: 14px;
      left: 18px;
      right: 18px;
      min-height: 88px;
      background:
        linear-gradient(180deg, rgba(20,28,20,0.96), rgba(7,11,9,0.98)),
        radial-gradient(circle at top left, rgba(74,222,128,0.14), transparent 38%);
      border: 1px solid rgba(122,255,170,0.12);
      border-radius: 24px;
      backdrop-filter: blur(20px) saturate(140%);
      box-shadow: 0 18px 44px rgba(0,0,0,0.48), inset 0 1px 0 rgba(255,255,255,0.03);
      display: flex;
      align-items: center;
      padding: 14px 18px;
      gap: 14px;
      z-index: 50;
      overflow: hidden;
    }
    #player-bar::before {
      content: '';
      position: absolute;
      inset: -18%;
      background-image: var(--player-cover-image);
      background-size: cover;
      background-position: center;
      filter: blur(34px) saturate(120%);
      opacity: 0.16;
      transform: scale(1.06);
      pointer-events: none;
    }
    #player-bar::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(255,255,255,0.04), transparent 26%, transparent 72%, rgba(255,255,255,0.02));
      pointer-events: none;
    }
    #player-bar > * { position: relative; z-index: 1; }
    .player-art {
      width: 60px;
      height: 60px;
      border-radius: 16px;
      background: linear-gradient(180deg, #172417, #0d140f);
      border: 1px solid rgba(122,255,170,0.08);
      box-shadow: 0 10px 24px rgba(0,0,0,0.34);
      flex-shrink: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #244024;
      position: relative;
    }
    .player-art::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(255,255,255,0.18), transparent 38%);
      pointer-events: none;
    }
    .player-art img { width:100%; height:100%; object-fit:cover; }
    .player-meta {
      min-width: 0;
      width: min(280px, 28vw);
      overflow: hidden;
      flex-shrink: 0;
    }
    .player-meta .p-title  {
      color: #f5f7f5;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .player-meta .p-artist {
      color: #8b988d;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 4px;
    }
    .p-queue-pos {
      font-size: 10px;
      color: #4ade80;
      margin-top: 5px;
      letter-spacing: .08em;
      text-transform: uppercase;
      font-weight: 700;
    }
    .player-btns {
      display:flex;
      align-items:center;
      gap:10px;
      flex-shrink:0;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 999px;
      padding: 6px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.025);
    }
    .p-btn {
      width: 40px;
      height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.04);
      color: #7b867c;
      font-size: 16px;
      cursor: pointer;
      border-radius: 999px;
      transition: transform .15s, color .15s, background .15s, border-color .15s, box-shadow .15s;
      line-height: 1;
      flex-shrink: 0;
      font-family: inherit;
      font-weight: 700;
    }
    .p-btn:hover {
      color: #edf2ee;
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,255,255,0.08);
      transform: translateY(-1px);
    }
    .p-btn.p-play {
      width: 56px;
      height: 56px;
      font-size: 26px;
      color: #061109;
      background: linear-gradient(180deg, #56ec8f, #35d970);
      border-color: rgba(122,255,170,0.32);
      box-shadow: 0 10px 28px rgba(74,222,128,0.28);
    }
    .p-btn.p-play:hover {
      color: #061109;
      background: linear-gradient(180deg, #69f09b, #3ee278);
      transform: translateY(-1px) scale(1.01);
    }
    .p-btn.p-active {
      color: #4ade80;
      border-color: rgba(74,222,128,0.24);
      background: rgba(74,222,128,0.08);
    }
    #p-like.liked {
      color:#f472b6;
      border-color: rgba(244,114,182,0.25);
      background: rgba(244,114,182,0.08);
    }
    #p-queue-btn {
      width: auto;
      min-width: 84px;
      padding: 0 14px;
      border-radius: 999px;
      font-size: 13px;
      gap: 6px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .queue-btn-icon { font-size: 16px; line-height: 1; }
    .queue-btn-label { font-size: 11px; font-weight: 700; color: #aab3ab; }
    .player-seek {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 999px;
      padding: 0 12px;
      min-height: 42px;
    }
    .p-time {
      color: #748176;
      font-size: 11px;
      white-space: nowrap;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
      font-weight: 600;
    }
    .seek-bar {
      flex: 1;
      height: 6px;
      background: #1b241d;
      border-radius: 999px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: height .1s, background .15s;
    }
    .seek-bar:hover { height: 8px; background:#202b23; }
    .seek-fill {
      height: 100%;
      background: linear-gradient(90deg, #37d970, #59eb93);
      border-radius: 999px;
      pointer-events: none;
      width: 0%;
      box-shadow: 0 0 18px rgba(74,222,128,0.26);
    }
    .player-vol {
      display:flex;
      align-items:center;
      gap:10px;
      flex-shrink:0;
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 999px;
      padding: 0 12px;
      min-height: 42px;
    }
    .player-vol .vol-icon {
      color:#7f8a81;
      font-size:14px;
      cursor:pointer;
      user-select:none;
    }
    .player-vol input[type=range] { width:86px; accent-color:#4ade80; cursor:pointer; }
    .player-bar-active #main-content { padding-bottom:104px; }

    /* ===== QUEUE PANEL ===== */
    #queue-panel { position:fixed; bottom:100px; left:0; right:0; max-height:340px; background:rgba(5,10,8,0.97); border-top:1px solid rgba(74,222,128,0.1); backdrop-filter:blur(12px); display:flex; flex-direction:column; z-index:49; transform:translateY(100%); transition:transform .25s ease; overflow:hidden; }
    body.queue-open #queue-panel { transform:translateY(0); }
    .queue-header { display:flex; align-items:center; padding:8px 16px; font-size:12px; color:#555; border-bottom:1px solid #1a2e1a; flex-shrink:0; gap:6px; }
    #queue-count-label { color:#333; flex:1; }
    .queue-close-btn { background:none; border:none; color:#444; cursor:pointer; font-size:14px; padding:2px 6px; }
    .queue-close-btn:hover { color:#ccc; }
    #queue-list { overflow-y:auto; flex:1; }
    #queue-list::-webkit-scrollbar { width:4px; }
    #queue-list::-webkit-scrollbar-thumb { background:#1a2e1a; border-radius:2px; }
    .queue-item { display:flex; align-items:center; padding:7px 16px; gap:10px; font-size:12px; color:#555; cursor:pointer; }
    .queue-item:hover { background:#0d180d; color:#bbb; }
    .queue-item.queue-current { color:#4ade80; }
    .queue-item-num { color:#2a3e2a; width:20px; text-align:right; flex-shrink:0; font-size:11px; }
    .queue-item-title { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .queue-item-artist { color:#3a4e3a; font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:120px; }
    .queue-item-remove { background:none; border:none; color:#2a3e2a; cursor:pointer; font-size:12px; padding:2px 4px; opacity:0; flex-shrink:0; transition:opacity .1s; }
    .queue-item:hover .queue-item-remove { opacity:1; color:#c44; }
    #p-queue-badge { font-size:9px; color:#4ade80; vertical-align:super; margin-left:2px; }
    .p-queue-pos { font-size:10px; color:#333; margin-top:1px; }

    /* ===== CONTEXT MENU ===== */
    #ctx-menu { position:fixed; display:none; background:#0d1a0d; border:1px solid #1a2e1a; border-radius:6px; box-shadow:0 8px 24px rgba(0,0,0,.7); z-index:200; min-width:182px; padding:4px 0; }
    .ctx-item { padding:8px 14px; font-size:13px; color:#888; cursor:pointer; display:flex; align-items:center; justify-content:space-between; position:relative; white-space:nowrap; }
    .ctx-item:hover { background:#0f1f0f; color:#ccc; }
    .ctx-sep { height:1px; background:#1a2e1a; margin:3px 0; }
    .ctx-arrow { color:#444; margin-left:6px; }
    .ctx-sub { position:absolute; left:100%; top:-4px; background:#0d1a0d; border:1px solid #1a2e1a; border-radius:6px; box-shadow:0 8px 24px rgba(0,0,0,.7); min-width:160px; padding:4px 0; display:none; z-index:201; }
    .ctx-has-sub:hover .ctx-sub { display:block; }

    /* ===== LIKE BUTTONS ===== */
    #p-like { font-size:14px; }
    #p-like.liked { color:#f472b6; }
    .track-like-btn { background:none; border:none; color:#2a3e2a; cursor:pointer; font-size:12px; padding:0 4px; opacity:0; flex-shrink:0; line-height:1; }
    .music-track-row:hover .track-like-btn { opacity:1; }

  <script>
    const { ipcRenderer } = require('electron')

    // ── State ─────────────────────────────────────────────────────────────
    const PROXY_URL = 'http://23.95.216.131:3000'

    let currentView = 'media'
    let musicLibrary = null
    let playQueue = [], queueIdx = -1
    let pShuffle = false, repeatMode = 'none'
    let currentHls = null
    let musicVideoPlaying = false
    let cloudSources = []
    let b2Lib = null, b2DlUrl = null, b2DlToken = null
    let b2Popularity = null, b2PopularityLoading = false
    const VIDEO_EXTS_CLIENT = new Set(['.mp4','.mkv','.avi','.mov','.m4v','.flv'])
    let playlists = { liked: [], playlists: [] }
    let ctxTrack = null
    let cueAdvancing = false
    let serverFavsMeta = new Map() // filePath → {title, artist, album, format}

    // ── iTunes art fallback ────────────────────────────────────────────────
    const itunesArtCache = new Map()
    async function fetchItunesArt(artist, album) {
      const key = artist + '\x00' + (album || '')
      if (itunesArtCache.has(key)) return itunesArtCache.get(key)
      // Clean artist name: strip " – ..." or " - ..." suffixes from metadata patterns like "Artist – Album"
      const cleanArtist = artist.split(/\s+[–-]\s+/)[0].trim()
      const trySearch = async (a, alb) => {
        const term = encodeURIComponent(alb ? a + ' ' + alb : a)
        const res = await fetch('https://itunes.apple.com/search?term=' + term + '&entity=album&limit=5&media=music')
        const data = await res.json()
        if (!data.results?.length) return null
        const result = alb
          ? (data.results.find(r => r.collectionName?.toLowerCase().includes(alb.toLowerCase())) || data.results[0])
          : data.results[0]
        return result?.artworkUrl100?.replace('100x100bb', '600x600bb') || null
      }
      try {
        let url = await trySearch(cleanArtist, album)
        // If no result and we cleaned the name, try without album too
        if (!url && album) url = await trySearch(cleanArtist, '')
        itunesArtCache.set(key, url)
        return url
      } catch (e) { itunesArtCache.set(key, null); return null }
    }
    function applyItunesArt(artEl, url, initial) {
      if (!url || !artEl || !artEl.querySelector('.lib-card-initial')) return
      artEl.innerHTML = '<img src="' + url + '" onerror="this.style.display=\'none\';this.parentElement.innerHTML=\'<span class=\\\"lib-card-initial\\\">' + esc(initial) + '</span>\'">'
    }

    // ── Media key IPC ──────────────────────────────────────────────────────
    ipcRenderer.on('media-key', (_, cmd) => {
      if      (cmd === 'playpause') el('p-play')?.click()
      else if (cmd === 'next')      el('p-next')?.click()
      else if (cmd === 'prev')      el('p-prev')?.click()
      else if (cmd === 'stop')      { const a = el('music-audio'); if (a) { a.pause(); a.currentTime = 0 } }
    })

    // ── Playlist persistence ───────────────────────────────────────────────
    async function savePlaylists() { await ipcRenderer.invoke('save-playlists', playlists) }
    function trackKey(track) { return track.id || track.path || track.title }
    function isLiked(track) { return playlists.liked.includes(trackKey(track)) }
    function toggleLike(track) {
      const key = trackKey(track)
      const i = playlists.liked.indexOf(key)
      if (i === -1) playlists.liked.push(key); else playlists.liked.splice(i, 1)
      savePlaylists()
      // Sync to server for B2 tracks
      if (key && key.startsWith('Music/')) {
        const nowLiked = i === -1 // i === -1 means we just added it
        if (nowLiked) {
          serverFavsMeta.set(key, { filePath: key, title: track.title || '', artist: track.artist || '', album: track.album || '', format: (track.format || track.ext || '').replace('.', '').toUpperCase() })
        } else {
          serverFavsMeta.delete(key)
        }
        fetch(PROXY_URL + '/favorites', {
          method: nowLiked ? 'POST' : 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ filePath: key, title: track.title || '', artist: track.artist || '', album: track.album || '', format: (track.format || track.ext || '').replace('.', '').toUpperCase() })
        }).catch(e => console.warn('Favorites server sync failed:', e))
      }
      const liked = isLiked(track)
      const cur = playQueue[queueIdx]
      const pLike = el('p-like')
      if (pLike && cur && trackKey(cur) === key) {
        pLike.textContent = liked ? '♥' : '♡'
        pLike.classList.toggle('liked', liked)
      }
      document.querySelectorAll('.music-track-row').forEach(row => {
        const qi = parseInt(row.dataset.qi)
        const t = playQueue[qi]
        if (t && trackKey(t) === key) {
          const btn = row.querySelector('.track-like-btn')
          if (btn) { btn.textContent = liked ? '♥' : '♡'; btn.classList.toggle('liked', liked) }
        }
      })
    }

    // ── Queue management ───────────────────────────────────────────────────
    function addToQueue(track)  { playQueue.push(track); _queueUpdated() }
    function playNext(track)    { playQueue.splice(queueIdx + 1, 0, track); _queueUpdated() }
    function _queueUpdated()    { updateQueueBadge(); updateQueuePanel() }

    function updateQueueBadge() {
      const b = el('p-queue-badge')
      if (b) b.textContent = (playQueue.length - queueIdx - 1) > 0 ? (playQueue.length - queueIdx - 1) : ''
    }

    function updateQueuePanel() {
      const list = el('queue-list'); if (!list) return
      const remaining = playQueue.length - queueIdx - 1
      const lbl = el('queue-count-label'); if (lbl) lbl.textContent = '(' + remaining + ' remaining)'
      list.innerHTML = playQueue.map((t, i) => {
        const cur = i === queueIdx
        return '<div class="queue-item' + (cur ? ' queue-current' : '') + '" data-qi="' + i + '">' +
          '<span class="queue-item-num">' + (cur ? '▶' : i + 1) + '</span>' +
          '<span class="queue-item-title">' + esc(t.title || t.path?.split(/[\\/]/).pop() || '') + '</span>' +
          '<span class="queue-item-artist">' + esc(t.artist || '') + '</span>' +
          (cur ? '' : '<button class="queue-item-remove" data-qi="' + i + '">✕</button>') +
        '</div>'
      }).join('')
      list.querySelectorAll('.queue-item').forEach(item => {
        item.addEventListener('click', e => {
          if (e.target.classList.contains('queue-item-remove')) return
          queueIdx = parseInt(item.dataset.qi)
          playTrack(playQueue[queueIdx], queueIdx)
        })
      })
      list.querySelectorAll('.queue-item-remove').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation()
          const i = parseInt(btn.dataset.qi)
          playQueue.splice(i, 1)
          if (queueIdx >= i && queueIdx > 0) queueIdx--
          _queueUpdated()
        })
      })
      const cur = list.querySelector('.queue-current')
      if (cur) cur.scrollIntoView({ block: 'nearest' })
    }

    // ── Artist radio ───────────────────────────────────────────────────────
    function doArtistRadio(artistName) {
      if (!artistName) return
      // Try B2 library first
      if (b2Lib) {
        const artist = b2Lib.artists.find(a => a.name.toLowerCase() === artistName.toLowerCase())
        if (artist) {
          const bucket = b2Lib.bucketName || 'SpAtomify'
          const tracks = artist.albums.flatMap(a => a.tracks.map(t => b2TrackObj(t, artist.name, a, b2DlUrl, b2DlToken, bucket)))
          for (let i = tracks.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [tracks[i], tracks[j]] = [tracks[j], tracks[i]] }
          setQueue(tracks, 0)
          setStatus('Artist Radio: ' + artistName + ' · ' + tracks.length + ' tracks')
          return
        }
      }
      if (!musicLibrary) return
      const artist = musicLibrary.artists.find(a => a.name === artistName)
      if (!artist) return
      const tracks = [...artist.albums.flatMap(a => a.tracks)]
      for (let i = tracks.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [tracks[i], tracks[j]] = [tracks[j], tracks[i]]
      }
      setQueue(tracks, 0)
      setStatus('Artist Radio: ' + artistName + ' · ' + tracks.length + ' tracks')
    }

    // ── Playlist management ────────────────────────────────────────────────
    function createPlaylist(initialTrack) {
      return new Promise(resolve => {
        const modal = el('new-pl-modal')
        const dialog = el('new-pl-dialog')
        const input = el('new-pl-input')
        const okBtn = el('new-pl-ok')
        const cancelBtn = el('new-pl-cancel')
        if (!modal || !input || !okBtn || !cancelBtn) { resolve(null); return }

        const cleanup = () => {
          modal.style.display = 'none'
          document.body.classList.remove('playlist-modal-open')
          okBtn.removeEventListener('click', onOk)
          cancelBtn.removeEventListener('click', onCancel)
          input.removeEventListener('keydown', onKeyDown)
          modal.removeEventListener('click', onBackdropClick)
          dialog?.removeEventListener('click', stopDialogPropagation)
          dialog?.removeEventListener('touchstart', stopDialogPropagation)
        }
        const finish = name => {
          cleanup()
          if (!name?.trim()) { resolve(null); return }
          const pl = { id: 'pl_' + Date.now(), name: name.trim(), tracks: initialTrack ? [initialTrack] : [] }
          playlists.playlists.push(pl)
          savePlaylists()
          renderMusicTree(musicLibrary)
          resolve(pl)
        }
        const onOk = () => finish(input.value)
        const onCancel = () => finish(null)
        const onKeyDown = e => {
          if (e.key === 'Enter') finish(input.value)
          else if (e.key === 'Escape') finish(null)
        }
        const onBackdropClick = e => { if (e.target === modal) finish(null) }
        const stopDialogPropagation = e => e.stopPropagation()

        input.value = ''
        document.body.classList.add('playlist-modal-open')
        modal.style.display = 'flex'
        okBtn.addEventListener('click', onOk)
        cancelBtn.addEventListener('click', onCancel)
        input.addEventListener('keydown', onKeyDown)
        modal.addEventListener('click', onBackdropClick)
        dialog?.addEventListener('click', stopDialogPropagation)
        dialog?.addEventListener('touchstart', stopDialogPropagation)
        setTimeout(() => input.focus(), 50)
      })
    }
    function addTrackToPlaylist(track, plId) {
      const pl = playlists.playlists.find(p => p.id === plId); if (!pl) return
      if (!pl.tracks.some(t => (t.path || t.title) === (track.path || track.title))) pl.tracks.push(track)
      savePlaylists(); setStatus('Added to ' + pl.name)
    }
    function shuffleTracks(tracks) {
      const copy = [...tracks]
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1))
        ;[copy[i], copy[j]] = [copy[j], copy[i]]
      }
      return copy
    }
    let playlistPickerTrack = null
    let playlistPickerCreateBusy = false
    function showPlaylistPicker(track) {
      if (!track) return
      ctxTrack = track
      playlistPickerTrack = track
      const modal = el('pl-picker-modal')
      const list = el('pl-picker-list')
      const sub = el('pl-picker-sub')
      if (!modal || !list) return
      if (sub) sub.textContent = 'Add "' + (track.title || track.path?.split(/[\\/]/).pop() || 'Track') + '" to a playlist.'
      const items = playlists.playlists.map(pl =>
        '<button class="pl-picker-item" data-pl-id="' + esc(pl.id) + '" style="width:100%;text-align:left;background:#101910;border:1px solid #1d311d;color:#eef3ef;padding:12px 14px;border-radius:12px;cursor:pointer;font-size:13px;font-weight:600">' +
        esc(pl.name) + '<span style="float:right;color:#6d7c6d;font-weight:500">' + pl.tracks.length + '</span></button>'
      ).join('')
      list.innerHTML = items || '<div style="color:#6d7c6d;font-size:12px;padding:8px 2px">No playlists yet. Create one below.</div>'
      list.querySelectorAll('[data-pl-id]').forEach(item => item.addEventListener('click', () => {
        addTrackToPlaylist(track, item.dataset.plId)
        hidePlaylistPicker()
      }))
      modal.style.display = 'flex'
    }
    function hidePlaylistPicker() {
      const modal = el('pl-picker-modal')
      if (modal) modal.style.display = 'none'
      playlistPickerTrack = null
    }
    async function openNewPlaylistFromPicker(e) {
      if (e) {
        e.preventDefault()
        e.stopPropagation()
      }
      if (playlistPickerCreateBusy) return false
      const track = playlistPickerTrack || ctxTrack
      if (!track) return
      playlistPickerCreateBusy = true
      try {
        const pl = await createPlaylist(track)
        if (!pl) return false
        hidePlaylistPicker()
        setStatus('Created playlist: ' + pl.name)
        return false
      } finally {
        setTimeout(() => { playlistPickerCreateBusy = false }, 250)
      }
    }
    window.openNewPlaylistFromPicker = openNewPlaylistFromPicker
    async function showPlaylist(plId) {
      let tracks, name, color
      if (plId === 'liked') {
        const c = el('music-content-inner')
        // Need dlUrl/dlToken to build signed URLs — load B2 lib if not ready
        if (!b2DlUrl && playlists.liked.some(k => k.startsWith('Music/'))) {
          if (c) c.innerHTML = '<div class="lib-loading"><div class="spinner"></div><span>Loading library…</span></div>'
          try {
            const lib = await ipcRenderer.invoke('scan-b2-music')
            b2Lib = lib; b2DlUrl = lib.dlUrl; b2DlToken = lib.dlToken
          } catch (e) { setStatus('Error loading B2: ' + e.message) }
        }
        // Build track objects — prefer server metadata for clean titles/artist/format
        const bucket = b2Lib?.bucketName || 'SpAtomify'
        tracks = playlists.liked.map(filePath => {
          const meta = serverFavsMeta.get(filePath)
          if (filePath.startsWith('Music/') && b2DlUrl) {
            const encoded   = filePath.split('/').map(encodeURIComponent).join('/')
            const signedUrl = b2DlUrl + '/file/' + bucket + '/' + encoded + '?Authorization=' + b2DlToken
            const folder    = filePath.substring(0, filePath.lastIndexOf('/'))
            const coverUrl  = b2CoverUrl(folder + '/cover.jpg', b2DlUrl, b2DlToken, bucket)
            const ext       = '.' + filePath.split('.').pop().toLowerCase()
            return {
              id:        filePath,
              title:     meta?.title  || filePath.split('/').pop().replace(/\.[^.]+$/, ''),
              artist:    meta?.artist || '',
              album:     meta?.album  || '',
              format:    meta?.format || ext.replace('.','').toUpperCase(),
              path:      signedUrl,
              ext,
              coverPath: coverUrl,
            }
          }
          // Local track — look up in musicLibrary
          const localTracks = musicLibrary?.allTracks || []
          return localTracks.find(t => trackKey(t) === filePath) || null
        }).filter(Boolean)
        name = 'Liked Songs'; color = '#f472b6'

        // Render favorites with art + title + artist + format badge layout
        if (!c) return
        c.innerHTML =
          '<div class="lib-header" style="padding:20px 24px 16px">' +
            '<div class="lib-header-art" style="background:#1a0a1a;font-size:40px;color:#f472b6">♥</div>' +
            '<div class="lib-header-info">' +
              '<h2 style="color:#fff">Liked Songs</h2>' +
              '<div class="lib-sub">' + tracks.length + ' track' + (tracks.length !== 1 ? 's' : '') + '</div>' +
              '<button class="lib-play-btn" id="fav-play-all">▶ Play All</button>' +
              '<button class="lib-play-btn" id="fav-shuffle-all" style="margin-left:8px;background:#0f1a0f;border:1px solid #1a2e1a;color:#4ade80">⇄ Shuffle</button>' +
            '</div>' +
          '</div>' +
          '<div class="fav-list" id="fav-list"></div>'

        c.querySelector('#fav-play-all')?.addEventListener('click', () => setQueue(tracks, 0))
        c.querySelector('#fav-shuffle-all')?.addEventListener('click', () => { const shuffled = shuffleTracks(tracks); if (shuffled.length) setQueue(shuffled, 0) })

        const listEl = c.querySelector('#fav-list')
        listEl.innerHTML = tracks.map((t, i) => {
          const fmt = (t.format || t.ext?.replace('.','') || '').toUpperCase()
          const fmtCls = fmt === 'FLAC' ? 'fav-fmt' : 'fav-fmt mp3'
          const artHtml = t.coverPath
            ? '<img src="' + t.coverPath + '" onerror="this.parentElement.innerHTML=\'♪\'">'
            : '♪'
          return '<div class="fav-row" data-fav-i="' + i + '">' +
            '<div class="fav-art">' + artHtml + '</div>' +
            '<div class="fav-info">' +
              '<div class="fav-title">' + esc(t.title) + '</div>' +
              '<div class="fav-artist">' + esc(t.artist || '') + '</div>' +
            '</div>' +
            (fmt ? '<span class="' + fmtCls + '">' + fmt + '</span>' : '') +
            '<button class="fav-heart" data-fav-i="' + i + '" title="Unlike">♥</button>' +
          '</div>'
        }).join('')

        listEl.querySelectorAll('.fav-row').forEach(row => {
          const i = parseInt(row.dataset.favI)
          row.addEventListener('click', e => {
            if (e.target.classList.contains('fav-heart')) return
            listEl.querySelectorAll('.fav-row').forEach(r => r.classList.remove('playing'))
            row.classList.add('playing')
            setQueue(tracks, i)
          })
        })
        listEl.querySelectorAll('.fav-heart').forEach(btn => {
          btn.addEventListener('click', e => {
            e.stopPropagation()
            const i = parseInt(btn.dataset.favI)
            toggleLike(tracks[i])
            btn.closest('.fav-row').remove()
            tracks.splice(i, 1)
            c.querySelector('.lib-sub').textContent = tracks.length + ' track' + (tracks.length !== 1 ? 's' : '')
          })
        })
        return
      } else {
        const pl = playlists.playlists.find(p => p.id === plId); if (!pl) return
        tracks = pl.tracks; name = pl.name; color = '#4ade80'
      }
      const c = el('music-content-inner'); if (!c) return
      c.innerHTML =
        '<div class="music-album-header">' +
          '<div class="music-album-art placeholder" style="color:' + color + ';font-size:28px">' + (plId === 'liked' ? '♥' : '♪') + '</div>' +
          '<div class="music-album-meta">' +
            '<h2>' + esc(name) + '</h2>' +
            '<p class="meta-sub">' + tracks.length + ' track' + (tracks.length !== 1 ? 's' : '') + '</p>' +
            '<button class="play-all-btn">▶ Play All</button>' +
            '<button class="play-all-btn" id="pl-shuffle-btn" style="margin-left:8px;background:#0f1a0f;border:1px solid #1a2e1a;color:#4ade80">⇄ Shuffle</button>' +
            (plId !== 'liked' ? '<button class="play-all-btn" id="pl-delete-btn" style="margin-left:8px;background:#0f1a0f;color:#ff8d8d;border:1px solid #4a2323">✕ Delete Playlist</button>' : '') +
          '</div>' +
        '</div>' +
        '<div class="music-tracks-list">' +
          '<div class="music-track-header"><span>#</span><span>Title</span><span></span><span>Duration</span><span>Format</span></div>' +
          tracks.map((t, i) => plId !== 'liked' ? playlistTrackRowHtml(t, i) : trackRowHtml(t, i)).join('') +
        '</div>'
      c.querySelector('.play-all-btn').addEventListener('click', () => setQueue(tracks, 0))
      c.querySelector('#pl-shuffle-btn')?.addEventListener('click', () => { const shuffled = shuffleTracks(tracks); if (shuffled.length) setQueue(shuffled, 0) })
      c.querySelector('#pl-delete-btn')?.addEventListener('click', () => {
        const pl = playlists.playlists.find(p => p.id === plId)
        if (!pl) return
        if (!confirm('Delete playlist "' + pl.name + '"?')) return
        playlists.playlists = playlists.playlists.filter(p => p.id !== plId)
        savePlaylists()
        if (el('music-tree')) renderMusicTree(musicLibrary)
        setStatus('Deleted playlist: ' + pl.name)
        showAllTracks()
      })
      if (plId !== 'liked') wirePlaylistTrackRows(c, tracks, plId)
      else wireTrackRows(c, tracks)
    }

    // ── Context menu ───────────────────────────────────────────────────────
    function showCtxMenu(e, track) {
      e.preventDefault(); ctxTrack = track
      const menu = el('ctx-menu'); if (!menu) return
      el('ctx-like').textContent = isLiked(track) ? '♥ Unlike' : '♡ Like'
      const sub = el('ctx-playlist-sub')
      sub.innerHTML = playlists.playlists.map(pl =>
        '<div class="ctx-item" data-pl-id="' + esc(pl.id) + '">' + esc(pl.name) + '</div>'
      ).join('') + '<div class="ctx-sep"></div><div class="ctx-item" id="ctx-new-pl">+ New Playlist</div>'
      sub.querySelectorAll('[data-pl-id]').forEach(item => item.addEventListener('click', () => {
        addTrackToPlaylist(ctxTrack, item.dataset.plId); hideCtxMenu()
      }))
      sub.querySelector('#ctx-new-pl')?.addEventListener('click', () => { const track = ctxTrack; hideCtxMenu(); createPlaylist(track) })
      const W = window.innerWidth
      const x = e.clientX + 190 > W ? e.clientX - 190 : e.clientX
      const y = e.clientY + 280 > window.innerHeight ? e.clientY - 280 : e.clientY
      menu.style.left = x + 'px'; menu.style.top = y + 'px'; menu.style.display = 'block'
    }
    function hideCtxMenu() { const m = el('ctx-menu'); if (m) m.style.display = 'none'; ctxTrack = null }
    function initCtxMenu() {
      document.addEventListener('click', e => { if (!el('ctx-menu')?.contains(e.target)) hideCtxMenu() })
      el('ctx-play-now')?.addEventListener('click',   () => { if (ctxTrack) { setQueue([ctxTrack], 0); hideCtxMenu() } })
      el('ctx-play-next')?.addEventListener('click',  () => { if (ctxTrack) { playNext(ctxTrack); setStatus('Playing next: ' + (ctxTrack.title || '')); hideCtxMenu() } })
      el('ctx-add-queue')?.addEventListener('click',  () => { if (ctxTrack) { addToQueue(ctxTrack); setStatus('Added to queue'); hideCtxMenu() } })
      el('ctx-like')?.addEventListener('click',       () => { if (ctxTrack) { toggleLike(ctxTrack); hideCtxMenu() } })
      el('ctx-add-playlist')?.addEventListener('click', e => {
        if (!ctxTrack) return
        if (_isTouchDevice) {
          e.stopPropagation()
          hideCtxMenu()
          showPlaylistPicker(ctxTrack)
        }
      })
      el('ctx-artist-radio')?.addEventListener('click', () => {
        if (ctxTrack) { doArtistRadio(ctxTrack.albumArtist || ctxTrack.artist); hideCtxMenu() }
      })
      el('ctx-go-album')?.addEventListener('click', () => {
        if (!ctxTrack) return; hideCtxMenu()
        // B2 track: id is original B2 file path
        if (b2Lib && ctxTrack.id) {
          for (const a of b2Lib.artists) {
            const al = a.albums.find(al => al.tracks.some(t => t.path === ctxTrack.id))
            if (al) { showB2Album(a, al, b2Lib, b2DlUrl, b2DlToken); return }
          }
        }
        if (!musicLibrary) return
        const artist = musicLibrary.artists.find(a => a.albums.some(al => al.tracks.some(t => t.path === ctxTrack.path)))
        const album  = artist?.albums.find(al => al.tracks.some(t => t.path === ctxTrack.path))
        if (album) showAlbum(album)
      })
      el('ctx-go-artist')?.addEventListener('click', () => {
        if (!ctxTrack) return; hideCtxMenu()
        const artistName = ctxTrack.albumArtist || ctxTrack.artist
        if (b2Lib && artistName) {
          const artist = b2Lib.artists.find(a => a.name === artistName)
          if (artist) { showB2Artist(artist, b2Lib, b2DlUrl, b2DlToken); return }
        }
        if (!musicLibrary) return
        const artist = musicLibrary.artists.find(a => a.name === artistName)
        if (artist) showArtistTracks(artist)
      })
    }

    // ── NAV ────────────────────────────────────────────────────────────────
    document.querySelectorAll('.nav-item[data-view]').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'))
        item.classList.add('active')
        currentView = item.dataset.view
        renderView()
      })
    })

    document.getElementById('search-input').addEventListener('input', e => {
      const q = e.target.value.toLowerCase()
      if (currentView === 'media') filterMusicTree(q)
    })

    async function renderView() {
      if (currentView === 'media') { await renderMusic(); return }
      if (currentView === 'settings') { renderSettings(); return }

    // =====================================================
    function fmtTime(s) {
      if (!isFinite(s) || isNaN(s)) return '0:00'
      const m = Math.floor(s / 60), sec = Math.floor(s % 60)
      return m + ':' + String(sec).padStart(2, '0')
    }

        item.addEventListener('click', async () => {
          tree.querySelectorAll('.music-tree-item').forEach(i => i.classList.remove('active'))

    function filterMusicTree(q) {
      const tree = el('music-tree'); if (!tree) return
      tree.querySelectorAll('.music-tree-item').forEach(item => {
        item.style.display = (!q || item.textContent.toLowerCase().includes(q)) ? '' : 'none'
      })
      // If B2 library is loaded, do a full cross-category search
      if (b2Lib) {
        if (q) showB2Search(q)
        else showB2Artists(b2Lib, b2DlUrl, b2DlToken)
        return
      }
      // Fallback: filter visible rows/cards in content area
      const inner = el('music-content-inner')
      if (inner) {
        inner.querySelectorAll('.lib-track-row, .music-track-row').forEach(row => {
          row.style.display = (!q || row.textContent.toLowerCase().includes(q)) ? '' : 'none'
        })
        inner.querySelectorAll('.cloud-item').forEach(item => {
          item.style.display = (!q || item.textContent.toLowerCase().includes(q)) ? '' : 'none'
        })
        inner.querySelectorAll('.lib-card').forEach(card => {
          card.style.display = (!q || card.textContent.toLowerCase().includes(q)) ? '' : 'none'
        })
      }
    }

    function showB2Search(q) {
      const inner = el('music-content-inner'); if (!inner) return
      const bucket = b2Lib.bucketName || 'SpAtomify'
      const lq = q.toLowerCase()

      const matchArtists = b2Lib.artists.filter(a => a.name.toLowerCase().includes(lq))
      const matchAlbums = []
      const matchTracks = []

      for (const artist of b2Lib.artists) {
        for (const album of artist.albums) {
          if (album.name.toLowerCase().includes(lq) && !matchArtists.includes(artist)) {
            matchAlbums.push({ artist, album })
          }
          for (const track of album.tracks) {
            if (track.title.toLowerCase().includes(lq)) {
              matchTracks.push({ artist, album, track })
            }
          }
        }
      }

      let html = '<div class="lib-breadcrumb"><span class="crumb active">Search: ' + esc(q) + '</span></div>'

      if (!matchArtists.length && !matchAlbums.length && !matchTracks.length) {
        html += '<div class="music-empty"><span class="me-icon">🔍</span><span class="me-text">No results for "' + esc(q) + '"</span></div>'
        inner.innerHTML = html; return
      }

      if (matchArtists.length) {
        html += '<div class="lib-section-header">Artists</div><div class="lib-grid">'
        for (const artist of matchArtists) {
          const initial = (artist.name || '?').charAt(0).toUpperCase()
          const coverUrl = b2CoverUrl(artist.albums.find(a => a.coverPath)?.coverPath, b2DlUrl, b2DlToken, bucket)
          const artHtml = coverUrl
            ? '<img src="' + coverUrl + '" onerror="this.style.display=\'none\';this.parentElement.innerHTML=\'<span class=\\\"lib-card-initial\\\">' + esc(initial) + '</span>\'">'
            : '<span class="lib-card-initial">' + esc(initial) + '</span>'
          html += '<div class="lib-card" data-b2-artist="' + esc(artist.name) + '">' +
            '<div class="lib-card-art">' + artHtml + '</div>' +
            '<div class="lib-card-info"><div class="lib-card-name">' + esc(artist.name) + '</div>' +
            '<div class="lib-card-sub">' + artist.albums.length + ' album' + (artist.albums.length !== 1 ? 's' : '') + '</div></div>' +
            '</div>'
        }
        html += '</div>'
      }

      if (matchAlbums.length) {
        html += '<div class="lib-section-header">Albums</div><div class="lib-grid">'
        for (const { artist, album } of matchAlbums) {
          const initial = (album.name || '?').charAt(0).toUpperCase()
          const coverUrl = b2CoverUrl(album.coverPath, b2DlUrl, b2DlToken, bucket)
          const artHtml = coverUrl
            ? '<img src="' + coverUrl + '" onerror="this.style.display=\'none\';this.parentElement.innerHTML=\'<span class=\\\"lib-card-initial\\\">' + esc(initial) + '</span>\'">'
            : '<span class="lib-card-initial">' + esc(initial) + '</span>'
          html += '<div class="lib-card" data-b2-artist="' + esc(artist.name) + '" data-b2-album="' + esc(album.name) + '">' +
            '<div class="lib-card-art">' + artHtml + '</div>' +
            '<div class="lib-card-info"><div class="lib-card-name">' + esc(album.name) + '</div>' +
            '<div class="lib-card-sub">' + esc(artist.name) + '</div></div>' +
            '</div>'
        }
        html += '</div>'
      }

      if (matchTracks.length) {
        html += '<div class="lib-section-header">Tracks</div><div class="lib-track-list">'
        for (const { artist, album, track } of matchTracks) {
          html += '<div class="lib-track-row" style="grid-template-columns:1fr auto" data-b2-artist="' + esc(artist.name) + '" data-b2-album="' + esc(album.name) + '" data-b2-track="' + esc(track.title) + '">' +
            '<span class="lib-track-title" style="white-space:normal;overflow:visible;text-overflow:unset;color:#ccc">' + esc(track.title) + '</span>' +
            '<span style="color:#444;font-size:11px;white-space:nowrap;padding-left:16px">' + esc(artist.name) + ' — ' + esc(album.name) + '</span>' +
            '</div>'
        }
        html += '</div>'
      }

      inner.innerHTML = html

      inner.querySelectorAll('[data-b2-artist]').forEach(card => {
        card.addEventListener('click', () => {
          const artist = b2Lib.artists.find(a => a.name === card.dataset.b2Artist)
          if (!artist) return
          if (card.dataset.b2Album) {
            const album = artist.albums.find(a => a.name === card.dataset.b2Album)
            if (album) showB2Album(artist, album, b2Lib, b2DlUrl, b2DlToken)
          } else {
            showB2Artist(artist, b2Lib, b2DlUrl, b2DlToken)
          }
        })
        const artEl = card.querySelector('.lib-card-art')
        if (artEl?.querySelector('.lib-card-initial')) {
          const name = card.dataset.b2Album || card.dataset.b2Artist
          const artistName = card.dataset.b2Artist
          const albName = card.dataset.b2Album || ''
          fetchItunesArt(artistName, albName).then(url => applyItunesArt(artEl, url, name.charAt(0).toUpperCase()))
        }
      })

      inner.querySelectorAll('.lib-track-row[data-b2-track]').forEach(row => {
        row.addEventListener('click', () => {
          const artist = b2Lib.artists.find(a => a.name === row.dataset.b2Artist)
          if (!artist) return
          const album = artist.albums.find(a => a.name === row.dataset.b2Album)
          if (!album) return
          const ti = album.tracks.findIndex(t => t.title === row.dataset.b2Track)
          const tracks = album.tracks.map(t => b2TrackObj(t, artist.name, album, b2DlUrl, b2DlToken, bucket))
          setQueue(tracks, ti >= 0 ? ti : 0)
        })
      })
    }

    // ── Cloud browser ──────────────────────────────────────────────────────
    async function showCloudBrowser(src, folderPath, breadcrumbs) {
      const inner = el('music-content-inner'); if (!inner) return
      inner.innerHTML = '<div class="loading"><div class="spinner"></div><span>Loading cloud files…</span></div>'
      let listing
      try {
        listing = await ipcRenderer.invoke('list-cloud-files', { sourceId: src.id, folderPath })
      } catch (e) {
        inner.innerHTML = '<div class="music-empty"><span class="me-icon">☁</span><span class="me-text">Error loading ' + esc(src.name) + ':<br>' + esc(e.message) + '</span></div>'
        return
      }
      const crumbs = [...breadcrumbs, { label: folderPath != null ? folderPath.split('/').filter(Boolean).pop() || src.name : src.name, path: folderPath }]
      let html = '<div class="cloud-browser">'
      html += '<div class="cloud-breadcrumb"><span data-crumb-root="1">' + esc(src.name) + '</span>'
      crumbs.forEach((c, i) => {
        if (c.path == null && i === 0) return
        html += '<span class="crumb-sep"> › </span>'
        html += '<span class="' + (i === crumbs.length - 1 ? 'active' : '') + '" data-crumb-idx="' + i + '">' + esc(c.label) + '</span>'
      })
      html += '</div><div class="cloud-item-list">'
      for (const f of listing.folders) {
        html += '<div class="cloud-item is-folder" data-cloud-folder="' + esc(f.path) + '"><span class="cloud-item-icon">📂</span><span class="cloud-item-name">' + esc(f.name) + '</span></div>'
      }
      for (const f of listing.files) {
        const sz = f.size ? (f.size > 1e6 ? (f.size / 1e6).toFixed(1) + ' MB' : Math.round(f.size / 1e3) + ' KB') : ''
        const ext = f.name.includes('.') ? f.name.split('.').pop().toUpperCase() : ''
        html += '<div class="cloud-item">' +
          '<span class="cloud-item-icon">♪</span>' +
          '<span class="cloud-item-name">' + esc(f.name) + '</span>' +
          '<span class="cloud-item-meta">' + esc(ext) + (sz ? ' · ' + sz : '') + '</span>' +
          '<button class="cloud-play-btn" data-file-id="' + esc(f.id || f.path) + '" data-file-path="' + esc(f.path) + '" data-file-name="' + esc(f.name) + '">▶</button>' +
        '</div>'
      }
      if (!listing.folders.length && !listing.files.length) {
        html += '<div style="color:#333;font-size:12px;padding:16px">No media files found in this location.</div>'
      }
      html += '</div></div>'
      inner.innerHTML = html

      inner.querySelector('[data-crumb-root]')?.addEventListener('click', () => showCloudBrowser(src, null, []))
      inner.querySelectorAll('[data-crumb-idx]').forEach(el => {
        el.addEventListener('click', () => {
          const idx = parseInt(el.dataset.crumbIdx)
          const c = crumbs[idx]
          if (c) showCloudBrowser(src, c.path, crumbs.slice(0, idx))
        })
      })
      inner.querySelectorAll('[data-cloud-folder]').forEach(el => {
        el.addEventListener('click', () => showCloudBrowser(src, el.dataset.cloudFolder, crumbs))
      })
      inner.querySelectorAll('.cloud-play-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const fileId = btn.dataset.fileId, filePath = btn.dataset.filePath, name = btn.dataset.fileName
          btn.textContent = '…'; btn.disabled = true
          try {
            const url = await ipcRenderer.invoke('get-cloud-stream-url', { sourceId: src.id, fileId, filePath, _auth: listing._auth || null })
            const ext = '.' + name.split('.').pop().toLowerCase()
            const track = { title: name, artist: src.name, path: url, isVideo: VIDEO_EXTS_CLIENT.has(ext) }
            setQueue([track], 0); setStatus('Streaming: ' + name)
          } catch (e) { setStatus('Stream error: ' + e.message) }
          finally { btn.textContent = '▶'; btn.disabled = false }
        })
      })
    }

    function showArtistTracks(artist) {
      const allTracks = artist.albums.flatMap(a => a.tracks)
      const coverPath = artist.albums[0]?.coverPath

    const _isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0

    function wireTrackRows(container, tracks) {
      container.querySelectorAll('.music-track-row').forEach(row => {
        const i = parseInt(row.dataset.qi)
        row.addEventListener('click', e => {
          if (e.target.classList.contains('track-like-btn')) { toggleLike(tracks[i]); return }
          container.querySelectorAll('.music-track-row').forEach(r => r.classList.remove('active'))
          row.classList.add('active')
          setQueue(tracks, i)
        })
        row.addEventListener('dblclick', e => { e.preventDefault() })
        row.addEventListener('contextmenu', e => showCtxMenu(e, tracks[i]))
        let _lp = null, _lpFired = false
        row.addEventListener('touchstart', e => {
          _lpFired = false
          _lp = setTimeout(() => {
            _lpFired = true
            const t = e.touches[0]
            showCtxMenu({ preventDefault: function(){}, clientX: t.clientX, clientY: t.clientY }, tracks[i])
          }, 500)
        }, { passive: true })
        row.addEventListener('touchend',  () => clearTimeout(_lp))
        row.addEventListener('touchmove', () => clearTimeout(_lp))
      })
    }
    function wirePlaylistTrackRows(container, tracks, plId) {
      container.querySelectorAll('.music-track-row').forEach(row => {
        const i = parseInt(row.dataset.qi)

          setQueue(tracks, i)

    function markPlayingRow(queueIndex) {
      document.querySelectorAll('.music-track-row').forEach(r => r.classList.remove('playing'))

    // ── Queue & Playback ───────────────────────────────────────────────────
    function setQueue(tracks, startIdx) { playQueue = [...tracks]; queueIdx = startIdx; playTrack(playQueue[queueIdx], queueIdx) }

    function playTrack(track, idx) {
      if (!track) return
      cueAdvancing = false
      if (currentHls) { currentHls.destroy(); currentHls = null }
      musicVideoPlaying = track.isVideo || false
      const audio = el('music-audio')
      const isHttp = track.path.startsWith('http') || track.path.startsWith('/')
      const src = isHttp ? track.path : 'file:///' + track.path.replace(/\\/g, '/')

      if (musicVideoPlaying) {
        audio.pause(); audio.src = ''
        showVideoPlayer(track, src)
        el('p-fullscreen').style.display = ''
      } else {
        el('p-fullscreen').style.display = 'none'
        hideVideoPlayer()
        if (src.includes('.m3u8')) {
          const Hls = require('hls.js')
          if (Hls.isSupported()) {
            currentHls = new Hls()
            currentHls.loadSource(src)
            currentHls.attachMedia(audio)
            currentHls.on(Hls.Events.MANIFEST_PARSED, () => audio.play().catch(() => {}))
          }
        } else if (track.cueStartMs != null) {
          // CUE chapter — reuse loaded audio if same underlying file
          if (audio.src === src && audio.readyState >= 2) {
            audio.currentTime = track.cueStartMs / 1000
            audio.play().catch(() => {})
          } else {
            audio.src = src
            audio.preload = 'auto'
            audio.addEventListener('canplay', function seekOnce() {
              audio.removeEventListener('canplay', seekOnce)
              audio.currentTime = track.cueStartMs / 1000
              audio.play().catch(() => {})
            }, { once: true })
          }
        } else {
          audio.preload = 'auto'
          audio.src = src
          audio.play().catch(() => {})
        }
      }

      updatePlayerBar(track)
      showPlayerBar()
      if (idx !== undefined) markPlayingRow(idx)
      updateQueueBadge()
      if (document.body.classList.contains('queue-open')) updateQueuePanel()
      const pLike = el('p-like')
      if (pLike) { pLike.textContent = isLiked(track) ? '♥' : '♡'; pLike.classList.toggle('liked', isLiked(track)) }
      const pos = el('p-queue-pos')
      if (pos) pos.textContent = playQueue.length > 1 ? (queueIdx + 1) + ' / ' + playQueue.length : ''
      ipcRenderer.send('player-state-update', {
        playing: true,
        title:   track.title  || track.path?.split(/[\\/]/).pop() || '',
        artist:  track.artist || '',
        album:   track.album  || '',
        shuffle: pShuffle,
        queueIdx,
        queueLen: playQueue.length,
      })
    }

    function showVideoPlayer(track, src) {
      const c = el('music-content-inner'); if (!c) return
      c.innerHTML = '<div class="music-video-wrap"><video id="music-video-el" controls autoplay src="' + src + '"></video></div>'
      el('music-video-el').addEventListener('ended', onTrackEnded)
      el('music-video-el').addEventListener('timeupdate', () => {
        const v = el('music-video-el'); if (!v) return
        updateSeekBar(v.currentTime, v.duration)
      })
    }

    function hideVideoPlayer() { const v = el('music-video-el'); if (v) { v.pause(); v.src = '' } }
    function showPlayerBar()   { el('player-bar').style.display = ''; document.body.classList.add('player-bar-active') }
    function skipToPrevTrack(forceTrackSkip) {
      if (!playQueue.length) return
      const audio = el('music-audio')
      const med = musicVideoPlaying ? el('music-video-el') : audio
      const cur = playQueue[queueIdx]
      if (!forceTrackSkip && med) {
        if (cur?.cueStartMs != null) {
          const chOffset = med.currentTime - cur.cueStartMs / 1000
          if (chOffset > 3) { med.currentTime = cur.cueStartMs / 1000; return }
        } else if (med.currentTime > 3) {
          med.currentTime = 0
          return
        }
      }
      queueIdx = Math.max(0, queueIdx - 1)
      playTrack(playQueue[queueIdx], queueIdx)
    }
    function skipToNextTrack() {
      if (!playQueue.length) return
      queueIdx = pShuffle ? Math.floor(Math.random() * playQueue.length) : Math.min(playQueue.length - 1, queueIdx + 1)
      playTrack(playQueue[queueIdx], queueIdx)
    }
    function updateMediaSession(track) {
      if (!('mediaSession' in navigator) || !track) return
      try {
        const title = track.title || track.path.split(/[\\/]/).pop()
        const artist = track.artist || ''
        const album = track.album || ''
        const artwork = track.coverPath ? [
          { src: track.coverPath, sizes: '96x96', type: 'image/png' },
          { src: track.coverPath, sizes: '192x192', type: 'image/png' },
          { src: track.coverPath, sizes: '512x512', type: 'image/png' }
        ] : []
        navigator.mediaSession.metadata = new MediaMetadata({ title, artist, album, artwork })
      } catch (e) {}
      try {
        navigator.mediaSession.setActionHandler('play', () => el('p-play')?.click())
        navigator.mediaSession.setActionHandler('pause', () => el('p-play')?.click())
        navigator.mediaSession.setActionHandler('previoustrack', () => skipToPrevTrack(true))
        navigator.mediaSession.setActionHandler('nexttrack', () => skipToNextTrack())
        navigator.mediaSession.setActionHandler('seekbackward', null)
        navigator.mediaSession.setActionHandler('seekforward', null)
        navigator.mediaSession.setActionHandler('seekto', details => {
          if (details && typeof details.seekTime === 'number') seekToPct(details.seekTime / ((musicVideoPlaying ? el('music-video-el') : el('music-audio'))?.duration || 1))
        })
      } catch (e) {}
    }
    function updateMediaSessionState(playing) {
      if (!('mediaSession' in navigator)) return
      try { navigator.mediaSession.playbackState = playing ? 'playing' : 'paused' } catch (e) {}
    }
    function updateMediaSessionPosition(cur, dur) {
      if (!('mediaSession' in navigator) || !navigator.mediaSession.setPositionState || !isFinite(dur) || dur <= 0) return
      try {
        navigator.mediaSession.setPositionState({
          duration: dur,
          playbackRate: 1,
          position: Math.max(0, Math.min(cur, dur))
        })
      } catch (e) {}
    }

    function updatePlayerBar(track) {
      el('p-title').textContent  = track.title  || track.path.split(/[\\/]/).pop()
      el('p-artist').textContent = track.artist || (track.album ? track.album : 'Unknown')
      const art = el('player-art')
      if (track.coverPath) art.innerHTML = '<img src="' + track.coverPath + '" onerror="this.parentElement.textContent=\'♪\'">'
      else art.innerHTML = track.isVideo ? '🎬' : '♪'
      applyPlayerBackdrop(track.coverPath)
      syncNowPlaying(track)
      updateMediaSession(track)
    }

    function updateSeekBar(cur, dur) {
      el('p-cur').textContent = fmtTime(cur)
      el('p-dur').textContent = fmtTime(dur)
      el('seek-fill').style.width = (dur > 0 ? (cur / dur * 100) : 0) + '%'
      updateNowPlayingSeek(cur, dur)
      updateMediaSessionPosition(cur, dur)
    }

    // ── Now Playing full panel ─────────────────────────────────────────────
    function openNowPlaying() {
      if (!playQueue[queueIdx]) return
      syncNowPlaying(playQueue[queueIdx])
      document.body.classList.add('np-open')
    }
    function closeNowPlaying() { document.body.classList.remove('np-open') }
    function applyPlayerBackdrop(coverPath) {
      const bg = coverPath ? 'url("' + String(coverPath).replace(/"/g, '\\"') + '")' : 'none'
      el('player-bar')?.style.setProperty('--player-cover-image', bg)
      el('np-panel')?.style.setProperty('--player-cover-image', bg)
    }
    function syncNowPlaying(track) {
      const inner = el('np-art-inner'); if (!inner) return
      el('np-title').textContent = track.title || track.path.split(/[\\/]/).pop()
      el('np-sub').textContent   = track.artist || track.album || 'Unknown'
      applyPlayerBackdrop(track.coverPath)
      if (track.coverPath) {
        inner.className = ''
        inner.innerHTML = '<img src="' + track.coverPath + '" onerror="this.parentElement.className=\'np-art-ph\';this.parentElement.textContent=\'♪\'">'
      } else {
        inner.className = 'np-art-ph'
        inner.textContent = '♪'
      }
      const liked = isLiked(track)
      const lb = el('np-like-btn'); if (lb) { lb.textContent = liked ? '♥' : '♡'; lb.classList.toggle('liked', liked) }
      const audio = el('music-audio')
      const pb = el('np-play-btn'); if (pb) pb.textContent = (audio && !audio.paused) ? '⏸' : '▶'
      const sb = el('np-shuf-btn'); if (sb) sb.classList.toggle('np-active', pShuffle)
      const rb = el('np-rep-btn')
      if (rb) { rb.textContent = repeatMode === 'one' ? '↺¹' : '↺'; rb.classList.toggle('np-active', repeatMode !== 'none') }
    }
    function updateNowPlayingSeek(cur, dur) {
      const fill = el('np-seek-fill'); if (!fill) return
      fill.style.width = (dur > 0 ? (cur / dur * 100) : 0) + '%'
      el('np-cur').textContent = fmtTime(cur)
      el('np-dur').textContent = fmtTime(dur)
    }
    function seekToPct(pct) {
      const med = musicVideoPlaying ? el('music-video-el') : el('music-audio')
      const cur = playQueue[queueIdx]
      if (!med || !isFinite(med.duration)) return
      if (cur && cur.cueStartMs != null) {
        const s = cur.cueStartMs / 1000
        const e2 = cur.cueEndMs != null ? cur.cueEndMs / 1000 : med.duration
        med.currentTime = s + pct * (e2 - s)
      } else {
        med.currentTime = pct * med.duration
      }
    }

    function onTrackEnded() {
      cueAdvancing = false
      if (repeatMode === 'one') { playTrack(playQueue[queueIdx], queueIdx); return }
      let next = queueIdx + 1
      if (pShuffle) next = Math.floor(Math.random() * playQueue.length)
      if (next >= playQueue.length) { if (repeatMode === 'all') next = 0; else return }
      queueIdx = next; playTrack(playQueue[queueIdx], queueIdx)
    }

    // ── Stream URL ─────────────────────────────────────────────────────────
    async function playStreamUrl() {
      const raw = (el('stream-url') || {}).value?.trim(); if (!raw) return
      setStatus('Resolving stream...')
      let url = raw
      const isYt = /youtu\.?be(?:\.com)?|youtube\.com/.test(url)
      if (isYt) {
        try { url = await ipcRenderer.invoke('resolve-stream', url); setStatus('Stream resolved') }
        catch (e) { setStatus('yt-dlp error: ' + e); return }
      }
      const ext = url.split('?')[0].split('.').pop().toLowerCase()
      const isVideo = ['mp4','mkv','webm','avi','mov','m4v','flv'].includes(ext)
      const title = isYt ? raw.replace(/https?:\/\//,'') : (url.split('/').pop().split('?')[0] || raw)
      playTrack({ title, artist: 'Stream', path: url, isVideo, ext: '.' + ext, coverPath: null })
      setStatus('Playing stream')
    }

    function b2CoverUrl(filePath, dlUrl, dlToken, bucketName) {
      if (!filePath) return null
      const encoded = filePath.split('/').map(encodeURIComponent).join('/')
      return dlUrl + '/file/' + (bucketName || 'SpAtomify') + '/' + encoded + '?Authorization=' + dlToken
    }

    function getPopularityMeta(artistName) {
      return b2Popularity?.artists?.find(a => a.name === artistName) || null
    }

    function b2ArtistLocalScore(artist) {
      const tracks = artist.albums.reduce((s, album) => s + album.tracks.length, 0)
      return tracks + artist.albums.length * 6
    }

    function rankB2Artists(lib, popularity) {
      const popular = new Map((popularity?.artists || []).map(a => [a.name, a]))
      return [...lib.artists].sort((a, b) => {
        const ap = popular.get(a.name)?.popularityScore || popular.get(a.name)?.listenersRaw || 0
        const bp = popular.get(b.name)?.popularityScore || popular.get(b.name)?.listenersRaw || 0
        return (bp - ap) || (b2ArtistLocalScore(b) - b2ArtistLocalScore(a)) || a.name.localeCompare(b.name)
      })
    }

    function loadB2Popularity(lib, dlUrl, dlToken) {
      if (b2PopularityLoading) return
      b2PopularityLoading = true
      ipcRenderer.invoke('get-collection-popularity').then(data => {
        b2Popularity = data
        if (b2Lib === lib) showB2Artists(lib, dlUrl, dlToken)
      }).catch(() => {}).finally(() => { b2PopularityLoading = false })
    }

    function bindB2Cards(container, lib, dlUrl, dlToken) {
      container.querySelectorAll('[data-b2-artist]').forEach(card => {
        card.addEventListener('click', () => {
          const artist = lib.artists.find(a => a.name === card.dataset.b2Artist)
          if (!artist) return
          if (card.dataset.b2Album) {
            const album = artist.albums.find(a => a.name === card.dataset.b2Album)
            if (album) showB2Album(artist, album, lib, dlUrl, dlToken)
          } else {
            showB2Artist(artist, lib, dlUrl, dlToken)
          }
        })
        const artEl = card.querySelector('.lib-card-art')
        if (artEl?.querySelector('.lib-card-initial')) {
          const name = card.dataset.b2Album || card.dataset.b2Artist
          const ini = name.charAt(0).toUpperCase()
          fetchItunesArt(card.dataset.b2Artist, card.dataset.b2Album || '').then(async url => {
            if (url) { applyItunesArt(artEl, url, ini); return }
            try {
              const meta = card.dataset.b2Album
                ? await ipcRenderer.invoke('fetch-album-meta', { artistName: card.dataset.b2Artist, albumName: card.dataset.b2Album })
                : await ipcRenderer.invoke('fetch-artist-meta', { artistName: card.dataset.b2Artist })
              const image = meta?.coverArt || meta?.image
              if (image && artEl.querySelector('.lib-card-initial'))
                artEl.innerHTML = '<img src="' + image + '" alt="">'
            } catch(e) {}
          })
        }
      })
    }

    function showB2Artists(lib, dlUrl, dlToken) {
      const inner = el('music-content-inner'); if (!inner) return
      const bucket = lib.bucketName || 'SpAtomify'

      const totalTracks = lib.artists.reduce((s, a) => s + a.albums.reduce((ss, al) => ss + al.tracks.length, 0), 0)
      const totalAlbums = lib.artists.reduce((s, a) => s + a.albums.length, 0)
      const rankedArtists = rankB2Artists(lib, b2Popularity)
      const topArtists = rankedArtists.slice(0, 10)
      const featuredArtists = rankedArtists.slice(0, 8)
      const albumPool = lib.artists.flatMap(artist => artist.albums.map(album => ({ artist, album })))
      const featuredAlbums = albumPool
        .filter(x => x.album.coverPath)
        .sort((a, b) => (b.album.tracks?.length || 0) - (a.album.tracks?.length || 0))
        .slice(0, 8)
      const sourceAlbums = albumPool
        .map(x => ({ ...x, sourceFormat: detectAlbumSourceFormat(albumSourceText(x.album)) }))
        .filter(x => x.sourceFormat)
      const heroCovers = featuredAlbums.slice(0, 4)

      let html = '<div class="b2-home">' +
        '<section class="b2-hero">' +
          '<div>' +
            '<div class="b2-eyebrow">AtomicBlast Radio</div>' +
            '<h1>Your whole library, dialed in.</h1>' +
            '<div class="b2-hero-sub">Browse artists, jump into albums, or shuffle the full SpAtomify vault with a darker streaming-room feel.</div>' +
            '<div class="b2-hero-actions">' +
              '<button id="b2-shuffle-all-btn" class="b2-primary-btn">&#x21C4; Shuffle All</button>' +
              '<button id="b2-view-albums-btn" class="b2-ghost-btn">Browse Albums</button>' +

          html += '<div class="lib-card b2-home-card" data-b2-artist="' + esc(artist.name) + '">' +

      html += '<div class="b2-section-title"><div><div class="b2-section-kicker">Artist wall</div><h2>Artists</h2></div><button id="b2-all-artists-top" class="b2-pill-btn">' + lib.artists.length + ' total</button></div>'
      html += '<div class="lib-grid">'
      for (const artist of topArtists) {

        const coverUrl = b2CoverUrl(firstCover, dlUrl, dlToken, bucket)
        const totalTracks = artist.albums.reduce((s, a) => s + a.tracks.length, 0)
        const meta = getPopularityMeta(artist.name)

        const artHtml = coverUrl
          ? '<img src="' + coverUrl + '" onerror="this.style.display=\'none\';this.parentElement.innerHTML=\'<span class=\\\"lib-card-initial\\\">' + esc(initial) + '</span>\'">'

        html += '<div class="lib-card" data-b2-artist="' + esc(artist.name) + '">' +
          '<div class="lib-card-art">' + artHtml + '</div>' +

          '<div class="lib-card-sub">' + artist.albums.length + ' album' + (artist.albums.length !== 1 ? 's' : '') + ' · ' + totalTracks + ' tracks' + stats + '</div></div>' +

      }
      html += '</div></div>'
      inner.innerHTML = html

      el('b2-shuffle-all-btn')?.addEventListener('click', () => {
        const all = lib.artists.flatMap(a => a.albums.flatMap(al => al.tracks.map(t => b2TrackObj(t, a.name, al, dlUrl, dlToken, lib.bucketName))))
        for (let i = all.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [all[i], all[j]] = [all[j], all[i]] }
        setQueue(all, 0)
      })
      el('b2-view-albums-btn')?.addEventListener('click', () => showB2AllAlbums())
      el('b2-view-tracks-btn')?.addEventListener('click', () => showB2AllTracks())
      el('b2-all-albums-top')?.addEventListener('click', () => showB2AllAlbums())
      el('b2-all-artists-top')?.addEventListener('click', () => showB2AllArtists())

      bindB2Cards(inner, lib, dlUrl, dlToken)
