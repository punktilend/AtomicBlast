    function wireTrackRows(container, tracks) {
      container.querySelectorAll('.music-track-row').forEach(row => {
        const i = parseInt(row.dataset.qi)
        row.addEventListener('dblclick', () => setQueue(tracks, i))
        row.addEventListener('click', e => {
          if (e.target.classList.contains('track-like-btn')) { toggleLike(tracks[i]); return }
          container.querySelectorAll('.music-track-row').forEach(r => r.classList.remove('active'))
          row.classList.add('active')
        })
        row.addEventListener('contextmenu', e => showCtxMenu(e, tracks[i]))
      })
    }

    function markPlayingRow(queueIndex) {
      document.querySelectorAll('.music-track-row').forEach(r => r.classList.remove('playing'))
      const row = document.querySelector('.music-track-row[data-qi="' + queueIndex + '"]')
      if (row) { row.classList.add('playing'); row.scrollIntoView({ block: 'nearest' }) }
    }

    // ── Queue & Playback ───────────────────────────────────────────────────
    function setQueue(tracks, startIdx) { playQueue = [...tracks]; queueIdx = startIdx; playTrack(playQueue[queueIdx], queueIdx) }

    function playTrack(track, idx) {
      if (!track) return
      cueAdvancing = false
      if (currentHls) { currentHls.destroy(); currentHls = null }
      musicVideoPlaying = track.isVideo || false
      const audio = el('music-audio')
      const isHttp = track.path.startsWith('http')
      const src = isHttp ? track.path : 'file:///' + track.path.replace(/\\/g, '/')

      if (musicVideoPlaying) {
        audio.pause(); audio.src = ''
        showVideoPlayer(track, src)
        el('p-fullscreen').style.display = ''
      } else {
        el('p-fullscreen').style.display = 'none'
        hideVideoPlayer()
        if (src.includes('.m3u8')) {
          const Hls = require('hls.js')
          if (Hls.isSupported()) {
            currentHls = new Hls()
            currentHls.loadSource(src)
            currentHls.attachMedia(audio)
            currentHls.on(Hls.Events.MANIFEST_PARSED, () => audio.play().catch(() => {}))
          }
        } else if (track.cueStartMs != null) {
          // CUE chapter — reuse loaded audio if same underlying file
          if (audio.src === src && audio.readyState >= 2) {
            audio.currentTime = track.cueStartMs / 1000
            audio.play().catch(() => {})
          } else {
            audio.src = src
            audio.addEventListener('canplay', function seekOnce() {
              audio.removeEventListener('canplay', seekOnce)
              audio.currentTime = track.cueStartMs / 1000
              audio.play().catch(() => {})
            }, { once: true })
          }
        } else {
          audio.src = src
          audio.play().catch(() => {})
        }
      }

      updatePlayerBar(track)
      showPlayerBar()
      if (idx !== undefined) markPlayingRow(idx)
      updateQueueBadge(); updateQueuePanel()
      const pLike = el('p-like')
      if (pLike) { pLike.textContent = isLiked(track) ? '♥' : '♡'; pLike.classList.toggle('liked', isLiked(track)) }
      const pos = el('p-queue-pos')
      if (pos) pos.textContent = playQueue.length > 1 ? (queueIdx + 1) + ' / ' + playQueue.length : ''
      ipcRenderer.send('player-state-update', {
        playing: true,
        title:   track.title  || track.path?.split(/[\\/]/).pop() || '',
        artist:  track.artist || '',
        album:   track.album  || '',
        shuffle: pShuffle,
        queueIdx,
        queueLen: playQueue.length,
      })
    }

    function showVideoPlayer(track, src) {
      const c = el('music-content-inner'); if (!c) return
      c.innerHTML = '<div class="music-video-wrap"><video id="music-video-el" controls autoplay src="' + src + '"></video></div>'
      el('music-video-el').addEventListener('ended', onTrackEnded)
      el('music-video-el').addEventListener('timeupdate', () => {
        const v = el('music-video-el'); if (!v) return
        updateSeekBar(v.currentTime, v.duration)
      })
    }

    function hideVideoPlayer() { const v = el('music-video-el'); if (v) { v.pause(); v.src = '' } }
    function showPlayerBar()   { el('player-bar').style.display = ''; document.body.classList.add('player-bar-active') }

    function updatePlayerBar(track) {
      el('p-title').textContent  = track.title  || track.path.split(/[\\/]/).pop()
      el('p-artist').textContent = track.artist || (track.album ? track.album : 'Unknown')
      const art = el('player-art')
      if (track.coverPath) art.innerHTML = '<img src="' + track.coverPath + '" onerror="this.parentElement.textContent=\'♪\'">'
      else art.innerHTML = track.isVideo ? '🎬' : '♪'
    }

    function updateSeekBar(cur, dur) {
      el('p-cur').textContent = fmtTime(cur)
      el('p-dur').textContent = fmtTime(dur)
      el('seek-fill').style.width = (dur > 0 ? (cur / dur * 100) : 0) + '%'
    }

    function onTrackEnded() {
      cueAdvancing = false
      if (repeatMode === 'one') { playTrack(playQueue[queueIdx], queueIdx); return }
      let next = queueIdx + 1
      if (pShuffle) next = Math.floor(Math.random() * playQueue.length)
      if (next >= playQueue.length) { if (repeatMode === 'all') next = 0; else return }
      queueIdx = next; playTrack(playQueue[queueIdx], queueIdx)
    }

    // ── Stream URL ─────────────────────────────────────────────────────────
    async function playStreamUrl() {
      const raw = (el('stream-url') || {}).value?.trim(); if (!raw) return
      setStatus('Resolving stream...')
      let url = raw
      const isYt = /youtu\.?be(?:\.com)?|youtube\.com/.test(url)
      if (isYt) {
        try { url = await ipcRenderer.invoke('resolve-stream', url); setStatus('Stream resolved') }
        catch (e) { setStatus('yt-dlp error: ' + e); return }
      }
      const ext = url.split('?')[0].split('.').pop().toLowerCase()
      const isVideo = ['mp4','mkv','webm','avi','mov','m4v','flv'].includes(ext)
      const title = isYt ? raw.replace(/https?:\/\//,'') : (url.split('/').pop().split('?')[0] || raw)
      playTrack({ title, artist: 'Stream', path: url, isVideo, ext: '.' + ext, coverPath: null })
      setStatus('Playing stream')
    }

    // =====================================================
    // B2 LIBRARY BROWSER (Spotify/Plex-style)
    // =====================================================
    async function showB2Library() {
      const inner = el('music-content-inner'); if (!inner) return
      inner.innerHTML = '<div class="lib-loading"><div class="spinner"></div><span>Scanning B2 library…</span></div>'
      let lib
      try {
        lib = await ipcRenderer.invoke('scan-b2-music')
      } catch (e) {
        inner.innerHTML = '<div class="music-empty"><span class="me-icon">☁</span><span class="me-text">Error loading B2 library:<br>' + esc(e.message) + '</span></div>'
        return
      }
      b2Lib = lib; b2DlUrl = lib.dlUrl; b2DlToken = lib.dlToken
      showB2Artists(lib, lib.dlUrl, lib.dlToken)
    }

    function b2CoverUrl(filePath, dlUrl, dlToken, bucketName) {
      if (!filePath) return null
      const encoded = filePath.split('/').map(encodeURIComponent).join('/')
      return dlUrl + '/file/' + (bucketName || 'aharveyGoogleDriveBackup') + '/' + encoded + '?Authorization=' + dlToken
    }

    function showB2Artists(lib, dlUrl, dlToken) {
      const inner = el('music-content-inner'); if (!inner) return
      const bucket = lib.bucketName || 'aharveyGoogleDriveBackup'

      let html = '<div class="lib-breadcrumb"><span class="crumb active">Music</span></div>'
      html += '<div class="lib-grid">'
      for (const artist of lib.artists) {
        const initial = (artist.name || '?').charAt(0).toUpperCase()
        const firstCover = artist.albums.find(a => a.coverPath)?.coverPath
        const coverUrl = b2CoverUrl(firstCover, dlUrl, dlToken, bucket)
        const totalTracks = artist.albums.reduce((s, a) => s + a.tracks.length, 0)
        const artHtml = coverUrl
          ? '<img src="' + coverUrl + '" onerror="this.style.display=\'none\';this.parentElement.innerHTML=\'<span class=\\\"lib-card-initial\\\">' + esc(initial) + '</span>\'">'
          : '<span class="lib-card-initial">' + esc(initial) + '</span>'
        html += '<div class="lib-card" data-b2-artist="' + esc(artist.name) + '">' +
          '<div class="lib-card-art">' + artHtml + '</div>' +
          '<div class="lib-card-info"><div class="lib-card-name">' + esc(artist.name) + '</div>' +
          '<div class="lib-card-sub">' + artist.albums.length + ' album' + (artist.albums.length !== 1 ? 's' : '') + ' · ' + totalTracks + ' tracks</div></div>' +
          '</div>'
      }
      html += '</div>'
      inner.innerHTML = html

      inner.querySelectorAll('[data-b2-artist]').forEach(card => {
        card.addEventListener('click', () => {
          const artist = lib.artists.find(a => a.name === card.dataset.b2Artist)
          if (artist) showB2Artist(artist, lib, dlUrl, dlToken)
        })
        const artEl = card.querySelector('.lib-card-art')
        if (artEl?.querySelector('.lib-card-initial')) {
          const name = card.dataset.b2Artist
          const ini = name.charAt(0).toUpperCase()
          fetchItunesArt(name, '').then(async url => {
            if (url) { applyItunesArt(artEl, url, ini); return }
            try {
              const meta = await ipcRenderer.invoke('fetch-artist-meta', { artistName: name })
              if (meta?.image && artEl.querySelector('.lib-card-initial'))
                artEl.innerHTML = '<img src="' + meta.image + '" onerror="this.style.display=\'none\';this.parentElement.innerHTML=\'<span class=\\\"lib-card-initial\\\">' + esc(ini) + '</span>\'">'
            } catch(e) {}
          })
        }
      })
    }

    function normalizeAlbumName(name) {
      return name
        .replace(/^\d{4}\s*[-–]\s*/, '')  // strip year prefix "2022 - "
        .replace(/\s*[\(\[][^\)\]]*(flac|mp3|wav|24.?bit|\d+\s*k[hH]z|lossless|remaster|repack|deluxe|bonus|vinyl|japanese|alt|version|pmedia|spi\w*)[^\)\]]*[\)\]]/gi, '')
        .replace(/\s*\bflac\b/gi, '')
        .replace(/\s*\(alt\)/gi, '')
        .replace(/\s+/g, ' ')
        .trim()
        .toLowerCase()
    }

    function showB2Artist(artist, lib, dlUrl, dlToken) {
      const inner = el('music-content-inner'); if (!inner) return
      const bucket = lib.bucketName || 'aharveyGoogleDriveBackup'
      const initial = (artist.name || '?').charAt(0).toUpperCase()
      const firstCover = artist.albums.find(a => a.coverPath)?.coverPath
      const coverUrl = b2CoverUrl(firstCover, dlUrl, dlToken, bucket)
      const totalTracks = artist.albums.reduce((s, a) => s + a.tracks.length, 0)

      const artHtml = coverUrl
        ? '<img src="' + coverUrl + '" onerror="this.style.display=\'none\';this.parentElement.innerHTML=\'<span class=\\\"lib-card-initial\\\">' + esc(initial) + '</span>\'">'
        : '<span class="lib-card-initial">' + esc(initial) + '</span>'

      let html = '<div class="lib-breadcrumb">' +
        '<span class="crumb" id="b2-crumb-root">Music</span>' +
        '<span class="sep">›</span>' +
        '<span class="crumb active">' + esc(artist.name) + '</span></div>'

      html += '<div class="lib-header">' +
        '<div class="lib-header-art">' + artHtml + '</div>' +
        '<div class="lib-header-info">' +
          '<h2>' + esc(artist.name) + '</h2>' +
          '<div class="lib-sub">' + artist.albums.length + ' album' + (artist.albums.length !== 1 ? 's' : '') + ' · ' + totalTracks + ' tracks</div>' +
          '<div id="b2-artist-stats" class="lib-meta-stats"></div>' +
          '<button class="lib-play-btn" id="b2-artist-play">▶ Play All</button>' +
        '</div></div>' +
        '<div id="b2-artist-bio" class="lib-artist-bio"></div>' +
        '<div id="b2-artist-tags" class="lib-tags"></div>' +
        '<div id="b2-artist-similar"></div>'

      // Group albums by normalized name
      const groupMap = new Map()
      for (const album of artist.albums) {
        const key = normalizeAlbumName(album.name)
        if (!groupMap.has(key)) groupMap.set(key, [])
        groupMap.get(key).push(album)
      }
      const groups = [...groupMap.entries()] // [key, albums[]]

      html += '<div class="lib-grid">'
      for (const [groupKey, albums] of groups) {
        const primary = albums.reduce((best, a) => a.tracks.length >= best.tracks.length ? a : best, albums[0])
        const secondary = albums.length > 1 ? albums.find(a => a !== primary && a.coverPath) : null
        const albInitial = (primary.name || '?').charAt(0).toUpperCase()
        const frontUrl = b2CoverUrl(primary.coverPath, dlUrl, dlToken, bucket)
        const backUrl  = secondary ? b2CoverUrl(secondary.coverPath, dlUrl, dlToken, bucket) : null
        const totalTracks = albums.reduce((s, a) => s + a.tracks.length, 0)
        const subText = albums.length > 1
          ? albums.length + ' versions · ' + totalTracks + ' tracks'
          : totalTracks + ' track' + (totalTracks !== 1 ? 's' : '')

        let artHtml
        if (albums.length > 1) {
          const backImg = backUrl
            ? '<img src="' + backUrl + '">'
            : '<span class="lib-card-initial" style="font-size:32px">' + esc(albInitial) + '</span>'
          const frontImg = frontUrl
            ? '<img src="' + frontUrl + '" onerror="this.style.display=\'none\';this.parentElement.innerHTML=\'<span class=\\\"lib-card-initial\\\">' + esc(albInitial) + '</span>\'">'
            : '<span class="lib-card-initial">' + esc(albInitial) + '</span>'
          artHtml = '<div class="stacked-back">' + backImg + '</div>' +
                    '<div class="stacked-front">' + frontImg + '</div>' +
                    '<div class="stacked-badge">' + albums.length + '</div>'
        } else {
          artHtml = frontUrl
            ? '<img src="' + frontUrl + '" onerror="this.style.display=\'none\';this.parentElement.innerHTML=\'<span class=\\\"lib-card-initial\\\">' + esc(albInitial) + '</span>\'">'
            : '<span class="lib-card-initial">' + esc(albInitial) + '</span>'
        }

        const artClass = 'lib-card-art' + (albums.length > 1 ? ' stacked-art' : '')
        const displayName = normalizeAlbumName(primary.name).replace(/\b\w/g, c => c.toUpperCase()) || primary.name
        html += '<div class="lib-card" data-group-key="' + esc(groupKey) + '">' +
          '<div class="' + artClass + '">' + artHtml + '</div>' +
          '<div class="lib-card-info"><div class="lib-card-name">' + esc(displayName) + '</div>' +
          '<div class="lib-card-sub">' + subText + '</div></div>' +
          '</div>'
      }
      html += '</div>'
      inner.innerHTML = html

      inner.querySelector('#b2-crumb-root')?.addEventListener('click', () => showB2Artists(lib, dlUrl, dlToken))
      inner.querySelector('#b2-artist-play')?.addEventListener('click', () => {
        const allTracks = artist.albums.flatMap(a => a.tracks.map(t => b2TrackObj(t, artist.name, a, dlUrl, dlToken, bucket)))
        const shuffled = [...allTracks]
        for (let i = shuffled.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]]
        }
        setQueue(shuffled, 0)
      })
      // Art + metadata: try iTunes first, then multi-source aggregator
      const headerArtEl = inner.querySelector('.lib-header-art')
      const bioEl       = inner.querySelector('#b2-artist-bio')
      const tagsEl      = inner.querySelector('#b2-artist-tags')
      const similarEl   = inner.querySelector('#b2-artist-similar')
      const statsEl     = inner.querySelector('#b2-artist-stats')
      ;(async () => {
        let itunesUrl = null
        if (headerArtEl?.querySelector('.lib-card-initial')) {
          itunesUrl = await fetchItunesArt(artist.name, '')
          if (itunesUrl) applyItunesArt(headerArtEl, itunesUrl, initial)
        }
        try {
          const meta = await ipcRenderer.invoke('fetch-artist-meta', { artistName: artist.name })
          if (!meta) return
          // Image fallback
          if (!itunesUrl && meta.image && headerArtEl?.querySelector('.lib-card-initial'))
            headerArtEl.innerHTML = '<img src="' + meta.image + '" onerror="this.style.display=\'none\';this.parentElement.innerHTML=\'<span class=\\\"lib-card-initial\\\">' + esc(initial) + '</span>\'">'
          // Bio
          if (meta.bio && bioEl) {
            const links = [
              meta.bandcampUrl ? '<a href="#" onclick="ipcRenderer.invoke(\'open-url\',\'' + meta.bandcampUrl + '\');return false">Bandcamp ↗</a>' : '',
              meta.wikiUrl     ? '<a href="#" onclick="ipcRenderer.invoke(\'open-url\',\'' + meta.wikiUrl     + '\');return false">Wikipedia ↗</a>' : '',
              meta.deezerUrl   ? '<a href="#" onclick="ipcRenderer.invoke(\'open-url\',\'' + meta.deezerUrl   + '\');return false">Deezer ↗</a>'   : '',
            ].filter(Boolean).join(' ')
            const text = meta.bio.length > 500 ? meta.bio.slice(0, 500) + '…' : meta.bio
            bioEl.innerHTML = esc(text) + (links ? ' ' + links : '')
          }
          // Stats row
          if (statsEl) {
            const parts = []
            if (meta.formed)    parts.push('<span>Formed ' + esc(meta.formed) + '</span>')
            if (meta.country)   parts.push('<span>' + esc(meta.country) + '</span>')
            if (meta.type)      parts.push('<span>' + esc(meta.type) + '</span>')
            if (meta.listeners) parts.push('<span>' + meta.listeners + ' listeners</span>')
            if (meta.fans)      parts.push('<span>' + meta.fans + ' Deezer fans</span>')
            statsEl.innerHTML = parts.join('')
          }
          // Tags
          if (tagsEl && meta.tags?.length)
            tagsEl.innerHTML = meta.tags.map(t => '<span class="lib-tag">' + esc(t) + '</span>').join('')
          // Similar artists
          if (similarEl && meta.similar?.length) {
            similarEl.className = 'lib-similar'
            similarEl.innerHTML = '<div class="lib-similar-label">Similar Artists</div>' +
              '<div class="lib-similar-list">' +
              meta.similar.map(s => '<span class="lib-similar-chip" data-sim-artist="' + esc(s) + '">' + esc(s) + '</span>').join('') +
              '</div>'
            similarEl.querySelectorAll('.lib-similar-chip').forEach(chip => {
              chip.addEventListener('click', () => {
                const simArtist = lib.artists.find(a => a.name.toLowerCase() === chip.dataset.simArtist.toLowerCase())
                if (simArtist) showB2Artist(simArtist, lib, dlUrl, dlToken)
              })
            })
          }
        } catch(e) {}
      })()

      inner.querySelectorAll('[data-group-key]').forEach(card => {
        const gKey = card.dataset.groupKey
        const gAlbums = groupMap.get(gKey) || []
        card.addEventListener('click', () => {
          if (gAlbums.length === 1) {
            showB2Album(artist, gAlbums[0], lib, dlUrl, dlToken)
          } else {
            showB2AlbumGroup(artist, gAlbums, lib, dlUrl, dlToken)
          }
        })
        const artEl = card.querySelector('.lib-card-art')
        if (artEl?.querySelector('.lib-card-initial')) {
          const albName = gAlbums[0]?.name || gKey
          const albIni  = albName.charAt(0).toUpperCase()
          fetchItunesArt(artist.name, albName).then(async url => {
            if (url) { applyItunesArt(artEl, url, albIni); return }
            try {
              const meta = await ipcRenderer.invoke('fetch-album-meta', { artistName: artist.name, albumName: albName })
              if (meta?.coverArt && artEl.querySelector('.lib-card-initial'))
                artEl.innerHTML = '<img src="' + meta.coverArt + '" onerror="this.style.display=\'none\';this.parentElement.innerHTML=\'<span class=\\\"lib-card-initial\\\">' + esc(albIni) + '</span>\'">'
            } catch(e) {}
          })
        }
      })
    }

    async function showB2AlbumGroup(artist, albums, lib, dlUrl, dlToken) {
      const inner = el('music-content-inner'); if (!inner) return
      const bucket = lib.bucketName || 'aharveyGoogleDriveBackup'
      const primary = albums.reduce((best, a) => a.tracks.length >= best.tracks.length ? a : best, albums[0])
      const groupTitle = normalizeAlbumName(primary.name).replace(/\b\w/g, c => c.toUpperCase()) || primary.name
      const initial = groupTitle.charAt(0).toUpperCase()
      const coverUrl = b2CoverUrl(primary.coverPath, dlUrl, dlToken, bucket)
      const artHtml = coverUrl
        ? '<img src="' + coverUrl + '" onerror="this.style.display=\'none\';this.parentElement.innerHTML=\'<span class=\\\"lib-card-initial\\\">' + esc(initial) + '</span>\'">'
        : '<span class="lib-card-initial">' + esc(initial) + '</span>'

      let html = '<div class="lib-breadcrumb">' +
        '<span class="crumb" id="b2-crumb-root">Music</span>' +
        '<span class="sep">›</span>' +
        '<span class="crumb" id="b2-crumb-artist">' + esc(artist.name) + '</span>' +
        '<span class="sep">›</span>' +
        '<span class="crumb active">' + esc(groupTitle) + '</span></div>'

      const totalTracks = albums.reduce((s, a) => s + a.tracks.length, 0)
      html += '<div class="lib-header">' +
        '<div class="lib-header-art">' + artHtml + '</div>' +
        '<div class="lib-header-info">' +
          '<h2>' + esc(groupTitle) + '</h2>' +
          '<div class="lib-sub">' + esc(artist.name) + ' · ' + albums.length + ' versions · ' + totalTracks + ' tracks</div>' +
          '<button class="lib-play-btn" id="b2-group-play">▶ Play All</button>' +
        '</div></div>'

      html += '<div id="b2-group-sections"></div>'
      inner.innerHTML = html

      inner.querySelector('#b2-crumb-root')?.addEventListener('click', () => showB2Artists(lib, dlUrl, dlToken))
      inner.querySelector('#b2-crumb-artist')?.addEventListener('click', () => showB2Artist(artist, lib, dlUrl, dlToken))

      // Sort versions: most tracks first, then alphabetically
      const sorted = [...albums].sort((a, b) => b.tracks.length - a.tracks.length || a.name.localeCompare(b.name))

      const allQueued = []
      const sectionsEl = inner.querySelector('#b2-group-sections')

      for (const album of sorted) {
        const albCoverUrl = b2CoverUrl(album.coverPath, dlUrl, dlToken, bucket)
        const albInitial = (album.name || '?').charAt(0).toUpperCase()
        const artImg = albCoverUrl
          ? '<img src="' + albCoverUrl + '">'
          : '<span class="lib-card-initial" style="font-size:24px">' + esc(albInitial) + '</span>'

        let queuedTracks = album.tracks.map(t => b2TrackObj(t, artist.name, album, dlUrl, dlToken, bucket))
        let isCue = false

        if (album.cuePath) {
          try {
            const cueText = await ipcRenderer.invoke('fetch-b2-file-text', { filePath: album.cuePath })
            const parsed = parseCue(cueText)
            if (parsed.chapters.length > 0) {
              const af = parsed.audioFile?.toLowerCase().replace(/\\/g, '/')
              const matchRaw = album.tracks.find(t => {
                const fn = t.path.split('/').pop().toLowerCase()
                return af ? (fn === af || fn.replace(/\.[^.]+$/, '') === af.replace(/\.[^.]+$/, '')) : false
              }) || album.tracks[0]
              if (matchRaw) {
                const baseObj = b2TrackObj(matchRaw, artist.name, album, dlUrl, dlToken, bucket)
                queuedTracks = parsed.chapters.map(ch => ({
                  ...baseObj,
                  id: album.cuePath + '#' + ch.number,
                  title: ch.title || ('Track ' + ch.number),
                  artist: ch.performer || artist.name,
                  trackNo: ch.number,
                  cueStartMs: ch.startMs,
                  cueEndMs: ch.endMs != null ? ch.endMs : null,
                }))
                isCue = true
              }
            }
          } catch (e) { console.error('CUE error:', e) }
        }

        allQueued.push(...queuedTracks)
        const offset = allQueued.length - queuedTracks.length

        const subLabel = isCue
          ? queuedTracks.length + ' tracks (CUE)'
          : album.tracks.length + ' track' + (album.tracks.length !== 1 ? 's' : '')

        const section = document.createElement('div')
        section.className = 'album-version-section'
        let sHtml = '<div class="album-version-header">' +
          '<div class="album-version-art">' + artImg + '</div>' +
          '<div><div class="album-version-label">' + esc(album.name) + '</div>' +
          '<div class="album-version-sub">' + subLabel + '</div></div>' +
          '<button class="lib-play-btn" style="margin-left:auto;padding:5px 14px;font-size:11px" data-ver-play="' + offset + '">▶ Play</button>' +
          '</div>'

        sHtml += '<div class="lib-track-list">'
        queuedTracks.forEach((t, i) => {
          const num = t.trackNo || (i + 1)
          let durStr = '—'
          if (isCue && t.cueStartMs != null && t.cueEndMs != null) durStr = fmtTime((t.cueEndMs - t.cueStartMs) / 1000)
          sHtml += '<div class="lib-track-row" data-gti="' + (offset + i) + '">' +
            '<span class="lib-track-num">' + num + '</span>' +
            '<span class="lib-track-title">' + esc(t.title) + '</span>' +
            '<span class="lib-track-dur">' + (isCue ? durStr : '0:00') + '</span>' +
            '<span style="color:#2a3e2a;font-size:10px;text-transform:uppercase;text-align:right">' + (t.ext || '').replace('.', '') + '</span>' +
            '</div>'
        })
        sHtml += '</div>'
        section.innerHTML = sHtml
        sectionsEl.appendChild(section)
      }

      // Wire up play buttons and track rows after all sections rendered
      inner.querySelector('#b2-group-play')?.addEventListener('click', () => setQueue(allQueued, 0))
      inner.querySelectorAll('[data-ver-play]').forEach(btn => {
        const off = parseInt(btn.dataset.verPlay)
        btn.addEventListener('click', e => { e.stopPropagation(); setQueue(allQueued, off) })
      })
      inner.querySelectorAll('[data-gti]').forEach(row => {
        const idx = parseInt(row.dataset.gti)
        row.addEventListener('click', () => {
          inner.querySelectorAll('.lib-track-row').forEach(r => r.classList.remove('playing'))
          row.classList.add('playing')
          setQueue(allQueued, idx)
        })
      })
    }

    function b2TrackObj(track, artistName, album, dlUrl, dlToken, bucket) {
      const encodedPath = track.path.split('/').map(encodeURIComponent).join('/')
      const signedUrl   = dlUrl + '/file/' + bucket + '/' + encodedPath + '?Authorization=' + dlToken
      const coverUrl    = b2CoverUrl(album.coverPath, dlUrl, dlToken, bucket)
      return {
        id:         track.path,
        title:      track.title,
        artist:     artistName,
        album:      album.name,
        path:       signedUrl,
        ext:        track.ext,
        coverPath:  coverUrl,
      }
    }

    async function showB2Album(artist, album, lib, dlUrl, dlToken) {
      const inner = el('music-content-inner'); if (!inner) return
      const bucket = lib.bucketName || 'aharveyGoogleDriveBackup'
      const initial = (album.name || '?').charAt(0).toUpperCase()
      const coverUrl = b2CoverUrl(album.coverPath, dlUrl, dlToken, bucket)

      const artHtml = coverUrl
        ? '<img src="' + coverUrl + '" onerror="this.style.display=\'none\';this.parentElement.innerHTML=\'<span class=\\\"lib-card-initial\\\">' + esc(initial) + '</span>\'">'
        : '<span class="lib-card-initial">' + esc(initial) + '</span>'

      let html = '<div class="lib-breadcrumb">' +
        '<span class="crumb" id="b2-crumb-root">Music</span>' +
        '<span class="sep">›</span>' +
        '<span class="crumb" id="b2-crumb-artist">' + esc(artist.name) + '</span>' +
        '<span class="sep">›</span>' +
        '<span class="crumb active">' + esc(album.name) + '</span></div>'

      html += '<div class="lib-header">' +
        '<div class="lib-header-art">' + artHtml + '</div>' +
        '<div class="lib-header-info">' +
          '<h2>' + esc(album.name) + '</h2>' +
          '<div class="lib-sub" id="b2-album-sub">' + esc(artist.name) + '</div>' +
          '<button class="lib-play-btn" id="b2-album-play">▶ Play All</button>' +
        '</div></div>' +
        '<div id="b2-album-wiki" class="lib-album-wiki"></div>'

      html += '<div class="lib-track-list" id="b2-track-list-body">'
      html += '<div style="color:#2a3e2a;padding:12px;font-size:11px">' + (album.cuePath ? 'Loading CUE sheet…' : 'Loading tracks…') + '</div>'
      html += '</div>'
      inner.innerHTML = html

      inner.querySelector('#b2-crumb-root')?.addEventListener('click', () => showB2Artists(lib, dlUrl, dlToken))
      inner.querySelector('#b2-crumb-artist')?.addEventListener('click', () => showB2Artist(artist, lib, dlUrl, dlToken))

      // Cover art + wiki from aggregator
      ;(async () => {
        const albumArtEl = inner.querySelector('.lib-header-art')
        const wikiEl     = inner.querySelector('#b2-album-wiki')
        const subEl      = inner.querySelector('#b2-album-sub')
        try {
          let itunesUrl = null
          if (albumArtEl?.querySelector('.lib-card-initial')) {
            itunesUrl = await fetchItunesArt(artist.name, album.name)
            if (itunesUrl) applyItunesArt(albumArtEl, itunesUrl, initial)
          }
          const meta = await ipcRenderer.invoke('fetch-album-meta', { artistName: artist.name, albumName: album.name })
          if (!meta) return
          if (!itunesUrl && meta.coverArt && albumArtEl?.querySelector('.lib-card-initial'))
            albumArtEl.innerHTML = '<img src="' + meta.coverArt + '" onerror="this.style.display=\'none\';this.parentElement.innerHTML=\'<span class=\\\"lib-card-initial\\\">' + esc(initial) + '</span>\'">'
          if (meta.year && subEl && !subEl.textContent.includes(meta.year))
            subEl.textContent = artist.name + ' · ' + meta.year
          if (meta.wiki && wikiEl)
            wikiEl.textContent = meta.wiki.length > 400 ? meta.wiki.slice(0, 400) + '…' : meta.wiki
        } catch(e) {}
      })()

      // Build display tracks — expand CUE if present
      let queuedTracks = album.tracks.map(t => b2TrackObj(t, artist.name, album, dlUrl, dlToken, bucket))
      let isCue = false

      if (album.cuePath) {
        try {
          const cueText = await ipcRenderer.invoke('fetch-b2-file-text', { filePath: album.cuePath })
          const parsed  = parseCue(cueText)
          if (!parsed.isMultiFile && parsed.chapters.length > 0) {
            // Find the audio file the CUE references (or fall back to first track)
            const af = parsed.audioFile?.toLowerCase().replace(/\\/g, '/')
            const matchRaw = album.tracks.find(t => {
              const fn = t.path.split('/').pop().toLowerCase()
              return af ? (fn === af || fn.replace(/\.[^.]+$/, '') === af.replace(/\.[^.]+$/, '')) : false
            }) || album.tracks[0]

            if (matchRaw) {
              const baseObj  = b2TrackObj(matchRaw, artist.name, album, dlUrl, dlToken, bucket)
              queuedTracks   = parsed.chapters.map(ch => ({
                ...baseObj,
                id:          album.cuePath + '#' + ch.number,
                title:       ch.title || ('Track ' + ch.number),
                artist:      ch.performer || artist.name,
                trackNo:     ch.number,
                cueStartMs:  ch.startMs,
                cueEndMs:    ch.endMs != null ? ch.endMs : null,
              }))
              isCue = true
            }
          }
        } catch (e) {
          console.error('CUE fetch error:', e)
        }
      }

      // Render track list
      const listEl = inner.querySelector('#b2-track-list-body')
      if (!listEl) return

      const label = isCue
        ? '<div style="padding:6px 10px 2px;font-size:9px;color:#2a3e2a;font-weight:700;letter-spacing:.1em;text-transform:uppercase">Tracks (CUE)</div>'
        : ''
      let trackHtml = label
      queuedTracks.forEach((t, i) => {
        const num = t.trackNo || (i + 1)
        let durStr = '—'
        if (isCue && t.cueStartMs != null) {
          const startSec = t.cueStartMs / 1000
          const endSec   = t.cueEndMs   != null ? t.cueEndMs / 1000 : null
          durStr = endSec != null ? fmtTime(endSec - startSec) : '—'
        }
        trackHtml += '<div class="lib-track-row" data-b2-ti="' + i + '">' +
          '<span class="lib-track-num">' + num + '</span>' +
          '<span class="lib-track-title">' + esc(t.title) + '</span>' +
          '<span class="lib-track-dur">' + (isCue ? durStr : '0:00') + '</span>' +
          '<span style="color:#2a3e2a;font-size:10px;text-transform:uppercase;text-align:right">' + (t.ext || '').replace('.','') + '</span>' +
          '</div>'
      })

      const subLabel = isCue
        ? queuedTracks.length + ' track' + (queuedTracks.length !== 1 ? 's' : '') + ' (CUE)'
        : album.tracks.length + ' track' + (album.tracks.length !== 1 ? 's' : '')
      inner.querySelector('.lib-sub').textContent = artist.name + ' · ' + subLabel

      listEl.innerHTML = trackHtml
      inner.querySelector('#b2-album-play')?.addEventListener('click', () => setQueue(queuedTracks, 0))

      inner.querySelectorAll('.lib-track-row').forEach(row => {
        const i = parseInt(row.dataset.b2Ti)
        row.addEventListener('click', () => {
          inner.querySelectorAll('.lib-track-row').forEach(r => r.classList.remove('playing'))
          row.classList.add('playing')
          setQueue(queuedTracks, i)
        })
        row.addEventListener('dblclick', () => setQueue(queuedTracks, i))
      })
    }

    // ── Player bar init ────────────────────────────────────────────────────
    function initPlayerBar() {
      const audio = el('music-audio')
      audio.volume = 0.8
      audio.addEventListener('timeupdate', () => {
        const cur = playQueue[queueIdx]
        if (cur?.cueEndMs != null) {
          const endSec = cur.cueEndMs / 1000
          if (audio.currentTime >= endSec - 0.1 && !cueAdvancing) {
            cueAdvancing = true; onTrackEnded(); return
          }
          const startSec = (cur.cueStartMs || 0) / 1000
          updateSeekBar(audio.currentTime - startSec, endSec - startSec)
        } else if (cur?.cueStartMs != null) {
          // Last CUE chapter — no endMs, play to file end
          const startSec = cur.cueStartMs / 1000
          const durSec   = isFinite(audio.duration) ? audio.duration - startSec : 0
          updateSeekBar(audio.currentTime - startSec, durSec)
        } else {
          updateSeekBar(audio.currentTime, audio.duration)
        }
      })
      audio.addEventListener('ended', () => { if (!cueAdvancing) onTrackEnded() })
      audio.addEventListener('play',  () => { el('p-play').textContent = '⏸'; ipcRenderer.send('player-state-update', { playing: true,  shuffle: pShuffle }) })
      audio.addEventListener('pause', () => { el('p-play').textContent = '▶'; ipcRenderer.send('player-state-update', { playing: false, shuffle: pShuffle }) })

      el('p-play').addEventListener('click', () => {
        if (musicVideoPlaying) { const v = el('music-video-el'); if (v) v.paused ? v.play() : v.pause() }
        else audio.paused ? audio.play().catch(() => {}) : audio.pause()
      })
      el('p-prev').addEventListener('click', () => {
        if (!playQueue.length) return
        const med = musicVideoPlaying ? el('music-video-el') : audio
        const cur = playQueue[queueIdx]
        if (med) {
          if (cur?.cueStartMs != null) {
            const chOffset = med.currentTime - cur.cueStartMs / 1000
            if (chOffset > 3) { med.currentTime = cur.cueStartMs / 1000; return }
          } else if (med.currentTime > 3) { med.currentTime = 0; return }
        }
        queueIdx = Math.max(0, queueIdx - 1); playTrack(playQueue[queueIdx], queueIdx)
      })
      el('p-next').addEventListener('click', () => {
        if (!playQueue.length) return
        queueIdx = pShuffle ? Math.floor(Math.random() * playQueue.length) : Math.min(playQueue.length - 1, queueIdx + 1)
        playTrack(playQueue[queueIdx], queueIdx)
      })
      el('p-shuffle').addEventListener('click', () => { pShuffle = !pShuffle; el('p-shuffle').classList.toggle('p-active', pShuffle) })
      el('p-repeat').addEventListener('click', () => {
        repeatMode = repeatMode === 'none' ? 'all' : repeatMode === 'all' ? 'one' : 'none'
        el('p-repeat').textContent = repeatMode === 'one' ? '↺¹' : '↺'
        el('p-repeat').classList.toggle('p-active', repeatMode !== 'none')
      })
      el('p-vol').addEventListener('input', e => {
        const v = parseInt(e.target.value) / 100; audio.volume = v
        const vid = el('music-video-el'); if (vid) vid.volume = v
        el('vol-icon').textContent = v === 0 ? '🔇' : v < 0.4 ? '🔉' : '🔊'
      })
      el('vol-icon').addEventListener('click', () => {
        const muted = audio.muted = !audio.muted
        const vid = el('music-video-el'); if (vid) vid.muted = muted
        el('vol-icon').textContent = muted ? '🔇' : '🔊'
      })
      el('seek-bar').addEventListener('click', e => {
        const r = el('seek-bar').getBoundingClientRect()
        const pct = (e.clientX - r.left) / r.width
        const med = musicVideoPlaying ? el('music-video-el') : audio
        const cur = playQueue[queueIdx]
        if (med && isFinite(med.duration)) {
          if (cur?.cueStartMs != null) {
            const startSec = cur.cueStartMs / 1000
            const endSec   = cur.cueEndMs != null ? cur.cueEndMs / 1000 : med.duration
            med.currentTime = startSec + pct * (endSec - startSec)
          } else {
            med.currentTime = pct * med.duration
          }
        }
      })
      el('p-fullscreen').addEventListener('click', () => { const v = el('music-video-el'); if (v) v.requestFullscreen?.() })
      el('p-like')?.addEventListener('click', () => { if (playQueue[queueIdx]) toggleLike(playQueue[queueIdx]) })
      el('p-queue-btn')?.addEventListener('click', () => { document.body.classList.toggle('queue-open'); updateQueuePanel() })
      el('queue-close')?.addEventListener('click', () => { document.body.classList.remove('queue-open') })
    }

          // Dropbox fields
          '<div class="cs-dropbox-fields" style="display:' + dbVis + '">' +
          '<div class="cloud-field"><label>Access Token</label><input class="cs-dbtoken" value="' + esc(src.dropboxToken || '') + '" placeholder="sl.Ab…" type="password" autocomplete="off"></div>' +
          '<div class="cloud-field"><label>Starting Folder <span style="color:#333">(optional)</span></label><input class="cs-dbpath" value="' + esc(src.dropboxPath || '') + '" placeholder="/Music"></div>' +
          '</div>' +
          // Google Drive fields
          '<div class="cs-gdrive-fields" style="display:' + gdVis + '">' +
          '<div class="cloud-field"><label>API Key</label><input class="cs-gkey" value="' + esc(src.gdriveApiKey || '') + '" placeholder="AIza…" type="password" autocomplete="off"></div>' +
          '<div class="cloud-field"><label>Root Folder ID</label><input class="cs-gfolderid" value="' + esc(src.gdriveFolderId || '') + '" placeholder="1BxiMVs0XRA5…"></div>' +
          '</div>'
        card.querySelector('.cs-provider').addEventListener('change', renderCardFields)
        card.querySelector('.cloud-remove-btn').addEventListener('click', () => card.remove())
      }

      renderCardFields()
      container.appendChild(card)
    }

    function collectCloudSources(container) {
      return Array.from(container.querySelectorAll('.cloud-source-card')).map(card => {
        const prov = card.querySelector('.cs-provider')?.value || 'rclone'
        return {
          id: card.dataset.srcId || 'cs_' + Date.now(),
          name:           card.querySelector('.cs-name')?.value?.trim()          || 'Cloud Source',
          provider:       prov,
          rcloneRemote:   card.querySelector('.cs-rclone-remote')?.value?.trim() || '',
          rclonePrefix:   card.querySelector('.cs-rclone-prefix')?.value?.trim() || '',
          b2KeyId:        card.querySelector('.cs-b2keyid')?.value?.trim()       || '',
          b2AppKey:       card.querySelector('.cs-b2appkey')?.value?.trim()      || '',
          b2Bucket:       card.querySelector('.cs-b2bucket')?.value?.trim()      || '',
          b2Prefix:       card.querySelector('.cs-b2prefix')?.value?.trim()      || '',
          dropboxToken:   card.querySelector('.cs-dbtoken')?.value?.trim()       || '',
          dropboxPath:    card.querySelector('.cs-dbpath')?.value?.trim()        || '',
          gdriveApiKey:   card.querySelector('.cs-gkey')?.value?.trim()          || '',
          gdriveFolderId: card.querySelector('.cs-gfolderid')?.value?.trim()     || '',
        }
      })
    }

    // =====================================================
    // HELPERS
    // =====================================================
    function el(id) { return document.getElementById(id) }
    function setStatus(t) { el('status-text').textContent = t }
    function showEmpty(t, s) { el('main-content').innerHTML = '<div class="empty-state"><span class="empty-text">' + t + '</span><span class="empty-sub">' + (s || '') + '</span></div>' }
    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML }
    function fmtSize(b) { if (b < 1024) return b + ' B'; if (b < 1048576) return (b / 1024).toFixed(1) + ' KB'; return (b / 1048576).toFixed(1) + ' MB' }

    // ── CUE sheet parsing ──────────────────────────────────────────────────
    function parseCueTime(str) {
      const m = str.match(/(\d+):(\d+):(\d+)/)
      if (!m) return 0
      return parseInt(m[1]) * 60000 + parseInt(m[2]) * 1000 + Math.round(parseInt(m[3]) * 1000 / 75)
    }
    function parseCue(text) {
      if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1)
      const lines = text.split(/\r?\n/)
      let audioFile = null, chapters = [], curTrack = null, fileCount = 0
      for (const rawLine of lines) {
        const line = rawLine.trim(), up = line.toUpperCase()
        if (up.startsWith('FILE ')) {
          fileCount++
          const fm = line.match(/FILE\s+"?([^"]+)"?\s+\w+/i)
          if (fm) audioFile = fm[1].trim()
        } else if (up.startsWith('TRACK ')) {
          const tm = line.match(/TRACK\s+(\d+)\s+AUDIO/i)
          if (tm) curTrack = { number: parseInt(tm[1]), title: '', performer: '', startMs: 0 }
        } else if (curTrack) {
          if (up.startsWith('TITLE ')) {
            const tm = line.match(/TITLE\s+"?([^"]+)"?/i)
            if (tm) curTrack.title = tm[1].trim()
          } else if (up.startsWith('PERFORMER ')) {
            const pm = line.match(/PERFORMER\s+"?([^"]+)"?/i)
            if (pm) curTrack.performer = pm[1].trim()
          } else if (up.startsWith('INDEX 01 ')) {
            const im = line.match(/INDEX\s+01\s+(\d+:\d+:\d+)/i)
            if (im) { curTrack.startMs = parseCueTime(im[1]); chapters.push({ ...curTrack }); curTrack = null }
          }
        }
      }
      for (let i = 0; i < chapters.length - 1; i++) chapters[i].endMs = chapters[i + 1].startMs
      return { audioFile, chapters, isMultiFile: fileCount > 1 }
    }

    // =====================================================
    // KEYBOARD SHORTCUTS
    // =====================================================
    let lastEscTime = 0, escHintTimer = null

    document.addEventListener('keydown', e => {
      const inInput = e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA'
      if (e.key === 'Escape' && inInput) { e.target.blur(); return }
      if (inInput) return

      switch (e.key) {
        case 'Escape': {
          e.preventDefault()
          if (el('ctx-menu')?.style.display !== 'none') { hideCtxMenu(); break }
          const now = Date.now()
          if (now - lastEscTime < 1500) { ipcRenderer.invoke('quit-app') }
          else {
            lastEscTime = now
            const st = el('status-text')
            st.textContent = '⬡  Press Esc again to exit'; st.style.color = '#f97316'
            clearTimeout(escHintTimer)
            escHintTimer = setTimeout(() => { st.textContent = 'Ready'; st.style.color = '' }, 1500)
          }
          break
        }
        case 'F11': e.preventDefault(); ipcRenderer.invoke('toggle-fullscreen'); break
        case 'F5':
          e.preventDefault()
          ipcRenderer.invoke('rescan-music').then(lib => { musicLibrary = lib; setStatus('Library rescanned — ' + (lib.allTracks?.length || 0) + ' tracks') })
          break
        case 'f':
          if (!e.ctrlKey) break
          e.preventDefault(); el('search-input')?.focus(); break
        case '/': e.preventDefault(); el('music-search')?.focus() || el('search-input')?.focus(); break
        case ' ':
          e.preventDefault()
          if (musicVideoPlaying) { const v = el('music-video-el'); if (v) v.paused ? v.play() : v.pause() }
          else { const a = el('music-audio'); if (a?.src) a.paused ? a.play().catch(() => {}) : a.pause() }
          break
      }
    })

    // =====================================================
    // INIT
    // =====================================================
    async function init() {
      playlists = await ipcRenderer.invoke('get-playlists')
      // Pull server-side favorites and merge into liked list
      try {
        const res = await fetch(PROXY_URL + '/favorites')
        const serverFavs = await res.json()
        if (Array.isArray(serverFavs)) {
          for (const fav of serverFavs) {
            if (fav.filePath) {
              serverFavsMeta.set(fav.filePath, fav)
              if (!playlists.liked.includes(fav.filePath)) playlists.liked.push(fav.filePath)
            }
          }
          savePlaylists()
        }
      } catch (e) { console.warn('Could not load server favorites:', e) }
      await renderView()
      setStatus('Ready')
    }

    initPlayerBar()
    initCtxMenu()
    init()

    // =====================================================
    // ATOMICBLAST REMOTE CONTROL (Firefox extension API)
    // =====================================================
    ipcRenderer.on('remote-cmd', async (_, payload) => {
      const { cmd } = payload
      const audio = el('music-audio')
      switch (cmd) {
        case 'play':
          if (audio?.paused && audio?.src) audio.play().catch(() => {})
          break
        case 'pause':
          audio?.pause()
          break
        case 'stop':
          if (audio) { audio.pause(); audio.currentTime = 0 }
          ipcRenderer.send('player-state-update', { playing: false, title: '', artist: '', album: '' })
          break
        case 'next':
          el('p-next')?.click()
          break
        case 'prev':
          el('p-prev')?.click()
          break
        case 'shuffle':
          el('p-shuffle')?.click()
          ipcRenderer.send('player-state-update', { shuffle: pShuffle })
          break
        case 'load-b2-library':
          if (!b2Lib) {
            try {
              const lib = await ipcRenderer.invoke('scan-b2-music')
              b2Lib = lib; b2DlUrl = lib.dlUrl; b2DlToken = lib.dlToken
            } catch (e) { /* ignored */ }
          }
          break
        case 'play-b2-track':
          await remotePlayB2Track(payload.path)
          break
      }
    })

    async function remotePlayB2Track(trackPath) {
      if (!b2Lib) {
        try {
          const lib = await ipcRenderer.invoke('scan-b2-music')
          b2Lib = lib; b2DlUrl = lib.dlUrl; b2DlToken = lib.dlToken
        } catch (e) { return }
      }
      const bucket = b2Lib.bucketName || 'aharveyGoogleDriveBackup'
      for (const artist of b2Lib.artists) {
        for (const album of artist.albums) {
          const track = album.tracks.find(t => t.path === trackPath)
          if (track) {
            const trackObj = b2TrackObj(track, artist.name, album, b2DlUrl, b2DlToken, bucket)
            setQueue([trackObj], 0)
            return
          }
        }
      }
    }
  </script>
